<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SubjectHelper - Регистрация</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='back.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='avatar.ico') }}">

</head>

<body>
<header class="lp-header">
  <a href="/" class="lp-logo">SubjectHelper<span class="lp-dragon">🐉</span></a>
</header>
<canvas id="formula-canvas"></canvas>
<script src="{{ url_for('static', filename='formula-bg.js') }}"></script>

<div class="form">
  <h2>Регистрация</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('register') }}">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Пароль" required>
    <button type="submit">Зарегистрироваться</button>
  </form>
  <a href="{{ url_for('login') }}">Уже есть аккаунт? Войти</a>
</div>
<script src="{{ url_for('static', filename='formula-bg.js') }}"></script>
<script src="{{ url_for('static', filename='themes.js') }}"></script>
</body>
</html>
