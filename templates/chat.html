<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SubjectHelper - Чат</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='back.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='avatar.ico') }}">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>
<body>
  <header>
    <a href="/"><img class="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="Логотип"></a>
    {{ menu | safe }}
  </header>

  <main>
    <div class="text-center">
      <h1>AI-Репетитор</h1>
      <div class="info-bar"><p id="selected-info"></p></div>
    </div>

    <section class="main">
      <div class="chat" id="chat"></div>

      <div class="input-container">
        <div class="input-wrapper">
          <textarea id="question" placeholder="Введите ваш вопрос..."></textarea>
          <label for="file-upload" class="attach-btn" title="Прикрепить файл">
            <span class="material-icons">attach_file</span>
            <input type="file" id="file-upload" accept="image/*,.pdf,.txt" style="display: none;">
          </label>
          <button id="voice-btn" class="voice-btn" title="Голосовой ввод">
            <span class="material-icons">mic</span>
          </button>
        </div>
        <button onclick="askTutor()" class="send-btn">
          <span class="material-icons">send</span>
        </button>
      </div>
    </section>
  </main>

  {{ menu_js | safe }}

  <script>
    const chat = document.getElementById("chat");
    const textarea = document.getElementById("question");
    const fileInput = document.getElementById("file-upload");
    const voiceBtn = document.getElementById("voice-btn");
    let attachedFile = null;
    let recognition;

    function updateSelectedInfo() {
      const subject = localStorage.getItem("subject") || "Математика";
      const mode = localStorage.getItem("mode") || "explain";
      const userClass = localStorage.getItem("user_class") || "не выбран";
      const modeText = { explain: "Объяснение", step: "Решение", quiz: "Проверка", exam: "Экзамен" };
      document.getElementById("selected-info").innerText = `Класс: ${userClass} | Предмет: ${subject} | Режим: ${modeText[mode] || mode}`;
    }

    const welcome = {
      explain: "Привет! Какую тему тебе объяснить?",
      step: "Привет! Готов решать задачи?",
      quiz: "Привет! Хочешь проверить знания?",
      exam: "Привет! Готовимся к экзамену?"
    };

    window.addEventListener("load", async () => {
  updateSelectedInfo();

  // Приветствие
  const welcomeMsg = document.createElement("div"); welcomeMsg.className = "message ai";
  welcomeMsg.innerText = welcome[localStorage.getItem("mode") || "explain"];
  chat.appendChild(welcomeMsg);

  // ЗАГРУЖАЕМ ИСТОРИЮ
  try {
    const res = await fetch("/api/history", { method: "POST", credentials: "include" });
    const history = await res.json();

    // Сортируем по ID (по возрастанию — как в чате)
    history.sort((a, b) => a.id - b.id);

    for (const h of history) {
      // Пользователь
      const userMsg = document.createElement("div"); userMsg.className = "message user";
      userMsg.innerHTML = `<div>${h.question.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(userMsg);

      // ИИ
      const aiMsg = document.createElement("div"); aiMsg.className = "message ai";
      aiMsg.innerHTML = `<div>${h.answer.replace(/\n/g, '<br>')}</div>`;

      // ГРОМКОГОВОРИТЕЛЬ
      if ('speechSynthesis' in window && h.answer) {
        const utter = new SpeechSynthesisUtterance(h.answer); utter.lang = 'ru-RU'; utter.rate = 0.9;
        const speakBtn = document.createElement('button');
        speakBtn.innerHTML = '🔊';
        speakBtn.style = 'margin-top:8px; padding:6px 12px; border-radius:20px; font-size:0.85rem; font-weight:500; border:none; cursor:pointer; display:flex; align-items:center; gap:6px; background:rgba(76,175,80,0.25); color:#4CAF50; backdrop-filter:blur(4px); box-shadow:0 2px 6px rgba(0,0,0,0.1); transition:all 0.2s;';
        speakBtn.onmouseover = () => { speakBtn.style.background = 'rgba(76,175,80,0.4)'; speakBtn.style.transform = 'translateY(-1px)'; };
        speakBtn.onmouseout = () => { speakBtn.style.background = 'rgba(76,175,80,0.25)'; speakBtn.style.transform = 'translateY(0)'; };
        speakBtn.onclick = () => {
          if (speechSynthesis.speaking) { speechSynthesis.cancel(); speakBtn.innerHTML = '🔊'; }
          else { speechSynthesis.speak(utter); speakBtn.innerHTML = 'Стоп'; }
        };
        aiMsg.appendChild(speakBtn);
      }

      // ЗВЁЗДОЧКИ
      const stars = document.createElement("div"); stars.className = "rating-stars";
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement("span"); s.textContent = "★";
        if (i <= (h.rating || 0)) s.classList.add("rated");
        s.onclick = () => { rateAnswer(h.id, i); stars.querySelectorAll("span").forEach((el, idx) => el.classList.toggle("rated", idx < i)); stars.style.pointerEvents = "none"; };
        stars.appendChild(s);
      }
      aiMsg.appendChild(stars);

      chat.appendChild(aiMsg);
    }
    scrollToBottom();
  } catch (err) {
    console.error("Ошибка загрузки истории:", err);
  }

  textarea.focus();
});

    // ГОЛОС
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'ru-RU';
      recognition.interimResults = false;
      voiceBtn.addEventListener('click', () => {
        if (voiceBtn.classList.contains('recording')) { recognition.stop(); return; }
        voiceBtn.classList.add('recording');
        recognition.start();
      });
      recognition.onresult = e => { textarea.value += e.results[0][0].transcript + ' '; voiceBtn.classList.remove('recording'); textarea.focus(); };
      recognition.onerror = () => { voiceBtn.classList.remove('recording'); alert('Ошибка голоса'); };
      recognition.onend = () => voiceBtn.classList.remove('recording');
    } else {
      voiceBtn.style.display = 'none';
    }

    // ФАЙЛЫ
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      attachedFile = file;
      const preview = document.createElement('div'); preview.className = 'file-preview'; preview.id = 'file-preview';
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img'); img.src = URL.createObjectURL(file); preview.appendChild(img);
      } else {
        preview.innerHTML += `<span class="material-icons">description</span> ${file.name}`;
      }
      const remove = document.createElement('span'); remove.className = 'material-icons remove-file'; remove.textContent = 'close';
      remove.onclick = () => { preview.remove(); attachedFile = null; fileInput.value = ''; };
      preview.appendChild(remove);
      document.querySelector('.input-wrapper').appendChild(preview);
    });

    function scrollToBottom() { chat.scrollTop = chat.scrollHeight; }

        async function askTutor() {
      const q = textarea.value.trim();
      if (!q && !attachedFile) return;

      const userId = {{ session.get('user_id') | default('null') | tojson | safe }};
      if (!userId) { alert("Войдите в аккаунт!"); location.href = "/login"; return; }

      const userMsg = document.createElement("div"); userMsg.className = "message user";
      if (q) userMsg.innerHTML += `<div>${q.replace(/\n/g, '<br>')}</div>`;
      if (attachedFile && attachedFile.type.startsWith('image/')) {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(attachedFile);
        img.style = "max-width:200px; max-height:200px; border-radius:12px; margin-top:8px; display:block;";
        userMsg.appendChild(img);
      }
      chat.appendChild(userMsg);
      textarea.value = "";
      document.getElementById('file-preview')?.remove();
      const fileToSend = attachedFile; attachedFile = null; fileInput.value = '';

      const typing = document.createElement("div"); typing.className = "message ai"; typing.innerHTML = "Печатает..."; typing.id = "typing"; chat.appendChild(typing); scrollToBottom();

      const fd = new FormData();
      fd.append('question', q || "[только файл]");  // ← ИСПРАВЛЕНО
      fd.append('subject', localStorage.getItem("subject") || "Математика");
      fd.append('mode', localStorage.getItem("mode") || "explain");
      if (fileToSend) fd.append('file', fileToSend);

      try {
        const res = await fetch("/ask", { method: "POST", credentials: "include", body: fd });
        const data = await res.json();
        document.getElementById("typing")?.remove();

        const aiMsg = document.createElement("div"); aiMsg.className = "message ai";
        const answerText = data.answer ? data.answer.replace(/\n/g, '<br>') : "Файл обработан!";  // ← ИСПРАВЛЕНО
        aiMsg.innerHTML = `<div>${answerText}</div>`;



        // ГРОМКОГОВОРИТЕЛЬ
        if ('speechSynthesis' in window && data.answer) {
          const utter = new SpeechSynthesisUtterance(data.answer); utter.lang = 'ru-RU'; utter.rate = 0.9;
          const speakBtn = document.createElement('button');
          speakBtn.innerHTML = '🔊';
          speakBtn.style = 'margin-top:8px; padding:6px 12px; border-radius:20px; font-size:0.85rem; font-weight:500; border:none; cursor:pointer; display:flex; align-items:center; gap:6px; background:rgba(76,175,80,0.25); color:#4CAF50; backdrop-filter:blur(4px); box-shadow:0 2px 6px rgba(0,0,0,0.1); transition:all 0.2s;';
          speakBtn.onmouseover = () => { speakBtn.style.background = 'rgba(76,175,80,0.4)'; speakBtn.style.transform = 'translateY(-1px)'; };
          speakBtn.onmouseout = () => { speakBtn.style.background = 'rgba(76,175,80,0.25)'; speakBtn.style.transform = 'translateY(0)'; };
          speakBtn.onclick = () => {
            if (speechSynthesis.speaking) { speechSynthesis.cancel(); speakBtn.innerHTML = '🔊'; }
            else { speechSynthesis.speak(utter); speakBtn.innerHTML = 'Стоп'; }
          };
          aiMsg.appendChild(speakBtn);
        }

        // ЗВЁЗДОЧКИ
        if (data.question_id) {
          const stars = document.createElement("div"); stars.className = "rating-stars";
          for (let i = 1; i <= 5; i++) {
            const s = document.createElement("span"); s.textContent = "★";
            s.onclick = () => { rateAnswer(data.question_id, i); stars.querySelectorAll("span").forEach((el, idx) => el.classList.toggle("rated", idx < i)); stars.style.pointerEvents = "none"; };
            stars.appendChild(s);
          }
          aiMsg.appendChild(stars);
        }

        chat.appendChild(aiMsg);
        scrollToBottom();

      } catch (err) {
        document.getElementById("typing")?.remove();
        const errMsg = document.createElement("div"); errMsg.className = "message ai"; errMsg.style.color = "#ff6b6b"; errMsg.innerText = "Ошибка: " + err.message;
        chat.appendChild(errMsg);
        scrollToBottom();
      }
    }

    async function rateAnswer(history_id, rating) {
      try {
        await fetch("/rate", { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ history_id, rating }) });
      } catch (err) { console.error("Оценка:", err); }
    }
  </script>
</body>
</html>
