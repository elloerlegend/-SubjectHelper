<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SubjectHelper — Чат</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='back.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='avatar.ico') }}">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <header>
    <a href="/"><img class="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="Логотип"></a>
    {{ menu | safe }}
  </header>

  <main>
    <div class="mode-banner" id="modeBanner"></div>

    <!-- ══ БАННЕР РЕЖИМА ОБУЧЕНИЯ (Sprint / Journey) ══ -->
    <div id="path-banner"></div>

    <div class="text-center" style="padding-top:10px;">
      <div class="info-bar"><p id="selected-info"></p></div>
    </div>

    <div id="xp-toast" class="xp-toast" style="display:none;"></div>

    <!-- Полоска ежедневной цели -->
    <div id="daily-goal-bar" class="daily-goal-bar" style="display:none;">
      <span id="dg-label">0 / 5 сегодня</span>
      <div class="dg-track"><div class="dg-fill" id="dg-fill" style="width:0%"></div></div>
      <span id="dg-streak">🔥 0 дней</span>
    </div>

    <section class="main">

      <!-- QUIZ скорборд -->
      <div id="quiz-scoreboard" class="quiz-scoreboard" style="display:none;">
        <div class="qs-item"><span class="qs-icon">✅</span><span class="qs-val" id="qs-correct">0</span><span class="qs-lbl">правильно</span></div>
        <div class="qs-divider"></div>
        <div class="qs-item"><span class="qs-icon">❌</span><span class="qs-val" id="qs-wrong">0</span><span class="qs-lbl">ошибок</span></div>
        <div class="qs-divider"></div>
        <div class="qs-item"><span class="qs-icon">📝</span><span class="qs-val" id="qs-num">1</span><span class="qs-lbl">вопрос</span></div>
        <div class="qs-progress-wrap"><div class="qs-progress-fill" id="qs-progress" style="width:0%"></div></div>
      </div>

      <!-- STEP прогресс -->
      <div id="step-progress-bar" class="step-progress-bar" style="display:none;">
        <span class="spb-label">Шаг <b id="spb-num">1</b></span>
        <div class="spb-dots" id="spb-dots"></div>
        <span class="spb-task" id="spb-task"></span>
      </div>

      <!-- EXAM header — зависит от SUBMODE (фиксированного при создании чата) -->
      <div id="exam-header" style="display:none;">

        <!-- explain_tasks: сетка номеров заданий -->
        <div id="exam-explain-tasks-ui" style="display:none;">
          <div class="etg-header" id="etgHeader"></div>
          <div id="examTaskNumbers"></div>
        </div>

        <!-- practice / full: переключатель и прогресс -->
        <div id="exam-classic-ui" style="display:none;">
          <div id="exam-mode-selector" class="exam-mode-selector">
            <button class="exam-mode-btn active" id="btn-explain"  onclick="setExamSubmode('explain')">📖 Объяснение формата</button>
            <button class="exam-mode-btn"        id="btn-practice" onclick="setExamSubmode('practice')">🎯 Тренировка заданий</button>
            <button class="exam-mode-btn"        id="btn-full"     onclick="setExamSubmode('full')">⏱ Полный экзамен</button>
          </div>
          <div id="exam-progress-bar" class="exam-progress-bar" style="display:none;">
            <span class="epb-label">Задание <b id="epb-num">1</b> из <b id="epb-total">27</b></span>
            <div class="epb-dots" id="epb-dots"></div>
            <div id="exam-timer" class="exam-timer" style="display:none;">
              <span class="material-icons" style="font-size:14px">timer</span>
              <span id="timer-val">3:55:00</span>
            </div>
          </div>
        </div>

      </div>

      <div class="chat" id="chat"></div>

      <!-- Превью прикреплённого файла -->
      <div id="file-preview-bar" class="file-preview-bar" style="display:none;">
        <div class="fpb-inner">
          <span class="fpb-icon material-icons" id="fpb-icon">description</span>
          <span class="fpb-name" id="fpb-name"></span>
          <img id="fpb-img" class="fpb-img" src="" alt="" style="display:none;">
          <button class="fpb-remove" onclick="clearAttach()" title="Убрать файл">
            <span class="material-icons">close</span>
          </button>
        </div>
      </div>

      <!-- Поле ввода -->
      <div class="input-container" id="inputContainer">
        <div class="input-wrapper">
          <label class="attach-btn" for="file-input" title="Прикрепить файл">
            <span class="material-icons">attach_file</span>
            <input type="file" id="file-input" accept="image/*,.pdf,.txt,.docx"
                   style="display:none;" onchange="handleFileSelect(event)">
          </label>
          <textarea id="question" rows="1"></textarea>
          <button id="voice-btn" class="voice-btn" title="Голосовой ввод">
            <span class="material-icons">mic</span>
          </button>
        </div>
        <button class="send-btn" id="send-btn" onclick="askTutor()">
          <span class="material-icons">send</span>
        </button>
      </div>
    </section>
  </main>

  {{ menu_js | safe }}
  <script src="{{ url_for('static', filename='app.js') }}"></script>

  <script>
  // ══════════════════════════════════════════════
  //  КОНСТАНТЫ — данные из сессии
  // ══════════════════════════════════════════════
  const USER_ID = {{ session.get('user_id') | default('null') | tojson | safe }};

  {% if chat %}
  const MODE    = {{ chat.mode    | tojson | safe }};
  const SUBJECT = {{ chat.subject | tojson | safe }};
  const CLASS   = {{ chat.class_number | tojson | safe }};
  const SUBMODE = {{ (chat.submode    or '') | tojson | safe }};
  const MATH_LEVEL = {{ (chat.math_level or '') | tojson | safe }};
  {% else %}
  const MODE    = localStorage.getItem("mode")       || "explain";
  const SUBJECT = localStorage.getItem("subject")    || "Математика";
  const CLASS   = parseInt(localStorage.getItem("user_class") || "8");
  const SUBMODE = "";
  const MATH_LEVEL = "";
  {% endif %}
  const SUBJECT_PO = {{ (subject_po if subject_po is defined else 'предмету') | tojson | safe }};
  const INITIAL_PATH = {{ (initial_path_json if initial_path_json is defined else 'null') | safe }};

  const chatEl   = document.getElementById("chat");
  const textarea = document.getElementById("question");
  const sendBtn  = document.getElementById("send-btn");

  let lastQ        = "";
  let attachedFile = null;

  // STEP / QUIZ / EXAM состояние
  let stepState   = { num:0, task:"", maxSteps:8, done:false };
  let quizState   = { correct:0, wrong:0, num:1, topic:"", total:5, askedQuestions:[] };
  let examSubmode = "explain";
  let examState   = { taskNum:1, maxTasks:27, topic:"", timerInterval:null, seconds:3*3600+55*60 };

  // Активный путь обучения (null = Casual)
  window._activePath = null;

  // Настройки из БД
  let userSettings = {
    tts_enabled:  true,
    anim_enabled: true,
    enter_send:   true,
    daily_goal:   5,
    streak:       0,
    xp:           0,
    level:        1,
  };

  let sessionQuestions = 0;

  const MODES = {
    explain:{ color:"var(--accent)",  label:"🧠 Объяснение",       placeholder:"Напиши тему, которую хочешь понять..." },
    step:   { color:"var(--blue)",    label:"📐 Решение по шагам", placeholder:"Напиши задачу для пошагового решения..." },
    quiz:   { color:"var(--purple)",  label:"🎯 Проверка знаний",  placeholder:"Напиши тему для проверки знаний..." },
    exam:   { color:"var(--warning)", label:"📋 ЕГЭ/ОГЭ",         placeholder:"Напиши тему или номер задания..." },
  };
  const M = MODES[MODE] || MODES.explain;

  function fmtPathDeadline(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso.slice(0, 10) + 'T12:00:00');
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    } catch (e) { return iso; }
  }

  function fallbackSprintWelcome(p) {
    const po = esc(SUBJECT_PO);
    const goal = esc((p.sprint_goal || '').trim() || 'твоей цели');
    const dl = p.sprint_deadline
      ? ` Дедлайн: <b>${esc(fmtPathDeadline(p.sprint_deadline))}</b>.`
      : '';
    const topics = p.sprint_topics || [];
    const tline = topics.length
      ? `<br>Темы спринта: <b>${topics.slice(0, 10).map(x => esc(x)).join(', ')}</b>${topics.length > 10 ? '…' : ''}`
      : '';
    return `Отлично! Мы в <b>Sprint</b> по <b>${po}</b>. Цель: <b>${goal}</b>.${dl}${tline}<br><br>`
      + `Чтобы подбирать задания под твой учебник и программу, ответь, пожалуйста:<br>`
      + `• По какому учебнику ты занимаешься? (авторы, класс, издательство)<br>`
      + `• База или углублённый уровень? Какая программа (ФГОС и т.д.)?<br>`
      + `• Какие темы из плана уже проходили в классе?<br>`
      + `• Есть ли конкретное ДЗ или формат ближайшей контрольной?<br><br>`
      + `Как ответишь — начнём с первой темы. Можно приложить <b>фото</b> задания 📎`;
  }

  function buildWelcomeHtml(activePath) {
    const po = esc(SUBJECT_PO);
    if (activePath && activePath.mode === 'journey') {
      const goal = esc(activePath.journey_goal || 'твоей цели');
      const unit = activePath.current_unit_data && activePath.current_unit_data.title
        ? esc(activePath.current_unit_data.title)
        : '';
      const unitLine = unit ? ` Сейчас юнит: <b>${unit}</b>.` : '';
      return `🗺 Привет! Ты в <b>Journey</b> по <b>${po}</b> — долгая цель: <b>${goal}</b>.${unitLine}<br>`
        + `Пиши вопросы по материалу или проси план на сессию 📚`;
    }
    return {
      explain:`👋 Привет! Напиши любую тему по <b>${po}</b> — объясню просто и понятно для ${CLASS} класса.<br>Можно прикрепить <b>фото задания</b> 📎`,
      step:   `📐 Привет! Напиши задачу по <b>${po}</b> — будем решать по одному шагу.<br>Можно прикрепить <b>фото</b> с условием 📎`,
      quiz:   `🎯 Привет! Напиши тему по <b>${po}</b> — задам тебе 5 вопросов с вариантами ответа.`,
      exam:   `📋 Привет! Выбери режим подготовки к ЕГЭ/ОГЭ по <b>${po}</b>:<br><b>📖 Объяснение</b> — разбор формата<br><b>🎯 Тренировка</b> — задания вперемешку<br><b>⏱ Полный экзамен</b> — симуляция с таймером`,
    }[MODE] || `👋 Привет! Напиши вопрос по <b>${po}</b>.`;
  }

  function applyLearningPathChrome(activePath) {
    const banner = document.getElementById('modeBanner');
    const info = document.getElementById('selected-info');
    if (!banner || !info) return;
    if (!activePath) {
      banner.textContent = `${M.label}  ·  ${SUBJECT}  ·  ${CLASS} класс`;
      banner.style.color = M.color;
      info.innerText = `${CLASS} класс · ${SUBJECT} · ${M.label.replace(/^\S+\s/, '')}`;
      textarea.placeholder = M.placeholder;
      return;
    }
    const goalS = (activePath.sprint_goal || activePath.journey_goal || '').trim() || 'цель';
    if (activePath.mode === 'sprint') {
      banner.textContent = `⚡ Sprint · ${SUBJECT}`;
      banner.style.color = '#ff6b35';
      info.innerText = `Sprint · ${SUBJECT} — ${goalS}`;
      textarea.placeholder = 'Ответь про учебник / темы или задай вопрос по спринту 📎';
    } else if (activePath.mode === 'journey') {
      banner.textContent = `🗺 Journey  ·  ${SUBJECT}  ·  ${goalS}`;
      banner.style.color = 'var(--blue)';
      info.innerText = `Journey · ${SUBJECT} · ${goalS}`;
      textarea.placeholder = 'Вопрос по юниту или закрепление материала 📚';
    }
  }

  // ══════════════════════════════════════════════
  //  PATH BANNER — визуал для Sprint / Journey
  // ══════════════════════════════════════════════
  function renderPathBanner(path) {
    const banner = document.getElementById('path-banner');
    if (!banner || !path) return;

    if (path.mode === 'sprint') {
      const days    = path.days_left ?? '?';
      const done    = path.sprint_topics_done ?? [];
      const total   = path.sprint_topics ?? [];
      const left    = path.sprint_topics_left ?? [];
      const pct     = path.progress_pct ?? 0;
      const isUrgent = (typeof days === 'number') && days <= 1;
      const goalRaw = (path.sprint_goal || '').trim();
      const goalLine = goalRaw ? esc(goalRaw) : '<span class="sprint-b-goal-miss">Добавь цель в настройках пути</span>';
      const deadlineIso = path.sprint_deadline;
      let deadlineLong = '—';
      if (deadlineIso) {
        try {
          deadlineLong = esc(new Date(deadlineIso.slice(0, 10) + 'T12:00:00').toLocaleDateString('ru-RU', {
            day: 'numeric', month: 'long',
          }));
        } catch (e) { deadlineLong = esc(String(deadlineIso)); }
      }
      const nTopics = total.length;
      const doneN = done.length;
      const leftLbl = (typeof days === 'number')
        ? (days === 0 ? 'сегодня' : days === 1 ? 'завтра' : `${days} дн.`)
        : esc(String(days));

      const topicsHtml = nTopics
        ? total.map(t =>
            `<span class="pb-topic ${done.includes(t) ? 'done' : left[0] === t ? 'active' : ''}"
                   onclick="markTopicDone('${t.replace(/'/g, "\\'")}')">
              ${done.includes(t) ? '✅ ' : ''}${esc(t)}
            </span>`
          ).join('')
        : '<span class="pb-topic sprint-topic-placeholder">Темы появятся из плана Sprint</span>';

      banner.innerHTML = `
        <div class="path-banner sprint-banner sprint-banner-v2" id="sprintBanner">
          <div class="sprint-b-top">
            <div class="sprint-b-brand">
              <span class="sprint-b-lightning" aria-hidden="true">⚡</span>
              <div>
                <div class="sprint-b-title-row">
                  <span class="sprint-b-mode-label">Sprint</span>
                  <span class="sprint-b-dot">·</span>
                  <span class="sprint-b-subject-title">${esc(SUBJECT)}</span>
                </div>
                <p class="sprint-b-goal-text">${goalLine}</p>
              </div>
            </div>
            <button type="button" class="pb-stop-btn sprint-b-x" onclick="stopPath()" title="Завершить Sprint">✕</button>
          </div>
          <div class="sprint-b-metrics">
            <div class="sprint-b-metric">
              <span class="sprint-b-metric-val">${deadlineLong}</span>
              <span class="sprint-b-metric-lbl">дедлайн</span>
            </div>
            <div class="sprint-b-metric ${isUrgent ? 'sprint-b-metric-urgent' : ''}">
              <span class="sprint-b-metric-val">${leftLbl}</span>
              <span class="sprint-b-metric-lbl">осталось</span>
            </div>
            <div class="sprint-b-metric">
              <span class="sprint-b-metric-val">${nTopics ? `${doneN}/${nTopics}` : '—'}</span>
              <span class="sprint-b-metric-lbl">тем</span>
            </div>
            <div class="sprint-b-metric">
              <span class="sprint-b-metric-val">${pct}%</span>
              <span class="sprint-b-metric-lbl">прогресс</span>
            </div>
          </div>
          <div class="sprint-b-bar-wrap">
            <div class="pb-track sprint-b-bar"><div class="pb-fill sprint-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="pb-topics sprint-b-chip-row">${topicsHtml}</div>
        </div>`;

      // Fairik реагирует на Sprint
      if (window.Fairik && days === 0) {
        setTimeout(() => Fairik.say('Финальный день! Ты готов — погнали 🔥', 'bounce'), 1500);
      } else if (window.Fairik && days === 1) {
        setTimeout(() => Fairik.say('Завтра дедлайн! Последний рывок 💥', 'wiggle'), 1500);
      }

    } else if (path.mode === 'journey') {
      const roadmap = path.roadmap ?? [];
      const unit    = path.current_unit_data ?? {};
      const pct     = path.progress_pct ?? 0;
      const show    = roadmap.slice(0, 10);
      const jgoal = esc((path.journey_goal || '').trim() || 'цель');

      banner.innerHTML = `
        <div class="path-banner journey-banner" id="journeyBanner">
          <div class="pb-left">
            <div class="pb-headline">
              <span class="pb-badge journey-badge">🗺 JOURNEY</span>
              <span class="pb-sep">·</span>
              <span class="pb-subject">${esc(SUBJECT)}</span>
              <span class="pb-sep">·</span>
              <span class="pb-goal-line">${jgoal}</span>
            </div>
          </div>
          <div class="pb-center">
            <div class="pb-track"><div class="pb-fill journey-fill" style="width:${pct}%"></div></div>
            <div class="pb-units">
              ${show.map(u =>
                `<span class="pb-unit ${u.unit < path.current_unit ? 'done' : u.unit === path.current_unit ? 'active' : 'locked'}"
                       title="${esc(u.title)}">${u.unit}</span>`
              ).join('')}
              ${roadmap.length > 10 ? `<span class="pb-unit locked" title="...">…</span>` : ''}
            </div>
          </div>
          <div class="pb-right">
            <span class="pb-unit-label">Юнит ${path.current_unit}/${roadmap.length}</span>
            <span class="pb-unit-title">${esc(unit.title || '—')}</span>
            <button class="pb-stop-btn" onclick="stopPath()" title="Завершить Journey">✕</button>
          </div>
        </div>`;

      // Fairik
      if (window.Fairik) {
        setTimeout(() => Fairik.say(`Юнит ${path.current_unit}: ${unit.title || SUBJECT}. Продолжаем! 📚`, 'nod'), 1500);
      }
    }

    // Сохраняем глобально
    window._activePath = path;
  }

  // Отметить тему Sprint выполненной
  async function markTopicDone(topic) {
    if (!window._activePath || window._activePath.mode !== 'sprint') return;
    const done = window._activePath.sprint_topics_done ?? [];
    if (done.includes(topic)) return;

    try {
      const res  = await fetch('/api/learning_path/complete_topic', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({path_id: window._activePath.id, topic}),
      });
      const data = await res.json();
      if (data.ok) {
        window._activePath.sprint_topics_done = data.done;
        window._activePath.sprint_topics_left = (window._activePath.sprint_topics ?? []).filter(t => !data.done.includes(t));
        window._activePath.progress_pct = data.progress_pct;
        renderPathBanner(window._activePath);
        if (window.Fairik) Fairik.happy(`✅ ${topic} — закрыто! ${data.is_complete ? 'Sprint завершён! 🏆' : 'Дальше! 💥'}`);
        if (data.is_complete) {
          addAiMsg(`🏆 <b>Sprint завершён!</b> Все темы пройдены. Хочешь изучить ${SUBJECT} глубже? Попробуй Journey!`, null, false, false);
        }
      }
    } catch(e) { console.error('complete_topic error', e); }
  }

  // Завершить / отменить путь
  async function stopPath() {
    if (!window._activePath) return;
    if (!confirm('Завершить этот путь обучения?')) return;
    try {
      await fetch('/api/learning_path/deactivate', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({path_id: window._activePath.id}),
      });
      window._activePath = null;
      document.getElementById('path-banner').innerHTML = '';
      applyLearningPathChrome(null);
      if (window.Fairik) Fairik.say('Путь завершён. Возвращайся когда будешь готов! 🐉', 'nod');
    } catch(e) { console.error('stopPath error', e); }
  }

  // ══════════════════════════════════════════════
  //  ЗАГРУЗКА НАСТРОЕК ИЗ БД
  // ══════════════════════════════════════════════
  async function loadSettings() {
    try {
      const res  = await fetch('/api/settings/load', { credentials: 'include' });
      const data = await res.json();
      userSettings = { ...userSettings, ...data };

      window._SH_tts_enabled   = userSettings.tts_enabled;
      window._SH_anim_enabled  = userSettings.anim_enabled;
      window._SH_enter_enabled = userSettings.enter_send;

      if (userSettings.theme) {
        document.documentElement.setAttribute('data-theme', userSettings.theme);
        localStorage.setItem('theme', userSettings.theme);
      }

      updateDailyGoalBar();
    } catch(e) {
      window._SH_tts_enabled   = localStorage.getItem('tts_enabled')  !== 'false';
      window._SH_anim_enabled  = localStorage.getItem('anim_enabled') !== 'false';
      window._SH_enter_enabled = localStorage.getItem('enter_send')   !== 'false';
    }
  }

  // ══════════════════════════════════════════════
  //  ДНЕВНАЯ ЦЕЛЬ
  // ══════════════════════════════════════════════
  function updateDailyGoalBar() {
    const goal = userSettings.daily_goal || 5;
    const done = sessionQuestions;
    const pct  = Math.min(100, Math.round(done / goal * 100));

    const bar = document.getElementById('daily-goal-bar');
    if (goal > 0) {
      bar.style.display = 'flex';
      document.getElementById('dg-label').textContent = `${done} / ${goal} сегодня`;
      document.getElementById('dg-fill').style.width  = pct + '%';
      document.getElementById('dg-streak').textContent = `🔥 ${userSettings.streak || 0} дней`;
    }

    if (done === goal && window.Fairik) {
      setTimeout(() => Fairik.celebrate(), 300);
      addAiMsg(`🎯 Цель дня достигнута! Ты прошёл <b>${goal} вопросов</b> сегодня. Файрик гордится! 🐉`, null, false, true);
    }
  }

  // ══════════════════════════════════════════════
  //  TTS
  // ══════════════════════════════════════════════
  const TTS = (() => {

    let bestVoice   = null;
    let voicesReady = false;

    const VOICE_PRIORITY = [
      v => v.lang==='ru-RU' && v.name.includes('Microsoft') && v.name.includes('Svetlana'),
      v => v.lang==='ru-RU' && v.name.includes('Microsoft') && v.name.includes('Irina'),
      v => v.lang==='ru-RU' && v.name.includes('Microsoft'),
      v => v.lang==='ru-RU' && v.name.includes('Milena'),
      v => v.lang==='ru-RU' && v.name.includes('Google'),
      v => v.lang==='ru-RU' && !v.name.toLowerCase().includes('espeak'),
      v => v.lang.startsWith('ru'),
    ];

    function pickBestVoice() {
      const voices = speechSynthesis.getVoices();
      for (const fn of VOICE_PRIORITY) {
        const v = voices.find(fn);
        if (v) return v;
      }
      return null;
    }

    function initVoices() {
      return new Promise(resolve => {
        if (speechSynthesis.getVoices().length) {
          bestVoice = pickBestVoice(); voicesReady = true; resolve(); return;
        }
        const h = () => {
          bestVoice = pickBestVoice(); voicesReady = true;
          speechSynthesis.removeEventListener('voiceschanged', h); resolve();
        };
        speechSynthesis.addEventListener('voiceschanged', h);
        setTimeout(() => { if (!voicesReady) { bestVoice = pickBestVoice(); voicesReady = true; resolve(); } }, 2000);
      });
    }

    if (window.speechSynthesis) initVoices();

    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html;
      return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
    }

    let currentAudio      = null;
    let isSpeakingBrowser = false;
    let stopFlag          = false;

    function stopAll() {
      stopFlag = true;
      if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
      if (window.speechSynthesis) speechSynthesis.cancel();
      isSpeakingBrowser = false;
    }

    async function speakVoiceRSS(text, btn) {
      btn.innerHTML = `<span class="tts-spin"></span> <span>Загружаю...</span>`;
      btn.disabled  = true;

      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.substring(0, 500) })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const blob     = await res.blob();
        const audioUrl = URL.createObjectURL(blob);

        if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
        currentAudio = new Audio(audioUrl);
        await currentAudio.play();

        btn.innerHTML = `⏹ <span>Стоп</span>`;
        btn.disabled  = false;

        currentAudio.onended = () => {
          URL.revokeObjectURL(audioUrl);
          currentAudio = null;
          btn.innerHTML = `🔊 <span>Озвучить</span>`;
          btn.onclick = () => speak(text, btn);
        };
        btn.onclick = () => {
          stopAll();
          btn.innerHTML = `🔊 <span>Озвучить</span>`;
          btn.onclick = () => speak(text, btn);
        };

      } catch(e) {
        console.warn('VoiceRSS error:', e.message, '— fallback to browser TTS');
        btn.disabled = false;
        speakBrowser(text, btn);
      }
    }

    async function speakBrowser(text, btn) {
      if (!window.speechSynthesis) { btn.innerHTML = `🔊 <span>Озвучить</span>`; return; }
      if (!voicesReady) await initVoices();

      stopFlag          = false;
      isSpeakingBrowser = true;
      btn.innerHTML     = `⏹ <span>Стоп</span>`;

      const sentences = text.match(/[^.!?;]+[.!?;]*/g) || [text];
      const chunks    = [];
      let cur         = '';
      for (const s of sentences) {
        if ((cur + s).length > 180) { if (cur) chunks.push(cur.trim()); cur = s; }
        else cur += (cur ? ' ' : '') + s;
      }
      if (cur) chunks.push(cur.trim());

      let idx = 0;
      function next() {
        if (stopFlag || idx >= chunks.length) {
          isSpeakingBrowser = false;
          btn.innerHTML = `🔊 <span>Озвучить</span>`;
          btn.onclick = () => speak(text, btn);
          return;
        }
        const u = new SpeechSynthesisUtterance(chunks[idx++]);
        u.lang = 'ru-RU'; u.rate = 0.92; u.pitch = 1.0; u.volume = 1.0;
        if (bestVoice) u.voice = bestVoice;
        u.onend   = next;
        u.onerror = () => { isSpeakingBrowser = false; btn.innerHTML = `🔊 <span>Озвучить</span>`; };
        speechSynthesis.speak(u);
      }

      btn.onclick = () => {
        stopFlag = true; speechSynthesis.cancel();
        isSpeakingBrowser = false;
        btn.innerHTML = `🔊 <span>Озвучить</span>`;
        btn.onclick = () => speak(text, btn);
      };

      next();
    }

    async function speak(rawText, btn) {
      const text = stripHtml(String(rawText));
      if (!text) return;

      if (currentAudio && !currentAudio.paused) { stopAll(); btn.innerHTML=`🔊 <span>Озвучить</span>`; btn.onclick=()=>speak(rawText,btn); return; }
      if (isSpeakingBrowser) { stopAll(); btn.innerHTML=`🔊 <span>Озвучить</span>`; btn.onclick=()=>speak(rawText,btn); return; }

      stopFlag = false;

      try {
        await speakVoiceRSS(text, btn);
      } catch(e) {
        speakBrowser(text, btn);
      }
    }

    function makeBtn(rawText, className = 'action-btn explain-btn') {
      const btn     = document.createElement('button');
      btn.className = className;
      btn.innerHTML = `🔊 <span>Озвучить</span>`;
      btn.onclick   = () => speak(rawText, btn);
      return btn;
    }

    return { speak, makeBtn, stripHtml };
  })();

  // ══════════════════════════════════════════════
  //  ФОРМАТИРОВАНИЕ MARKDOWN → HTML
  // ══════════════════════════════════════════════
  function mdToHtml(text) {
    return text
      .replace(/^### (.+)$/gm, '<h4>$1</h4>')
      .replace(/^## (.+)$/gm,  '<h3>$1</h3>')
      .replace(/^# (.+)$/gm,   '<h2>$1</h2>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<b><em>$1</em></b>')
      .replace(/\*\*(.+?)\*\*/g,     '<b>$1</b>')
      .replace(/\*(.+?)\*/g,         '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^[\*\-] (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm,  '<li>$1</li>')
      .replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, m => `<ul>${m}</ul>`)
      .replace(/^---$/gm, '<hr>')
      .replace(/\n/g, '<br>');
  }

  // ══════════════════════════════════════════════
  //  АНИМАЦИЯ ОТВЕТА
  // ══════════════════════════════════════════════
  function animateText(el, html, onDone) {
    const tokens = [];
    const re     = /(<[^>]+>)|([^<]+)/g;
    let m;
    while ((m = re.exec(html)) !== null) {
      if (m[1]) tokens.push({ type:"tag",  val:m[1] });
      else m[2].split(/(\s+)/).forEach(w => { if(w) tokens.push({ type:"word", val:w }); });
    }
    let i = 0, built = "";
    const speed = 18;
    function step() {
      if (i >= tokens.length) { if (onDone) onDone(); return; }
      const t = tokens[i++];
      built += t.val;
      el.innerHTML = built + '<span class="cursor-blink">▌</span>';
      if (i % 4 === 0) chatEl.scrollTop = chatEl.scrollHeight;
      setTimeout(step, t.type === "tag" ? 0 : speed);
    }
    step();
  }

  async function handleFileSelect(e) {
    const file = e.target.files[0]; if (!file) return;
    attachedFile = file;
    const name = document.getElementById("fpb-name");
    const icon = document.getElementById("fpb-icon");
    const img  = document.getElementById("fpb-img");
    name.textContent = file.name.length > 28 ? file.name.substring(0,25)+"…" : file.name;
    if (file.type.startsWith("image/")) {
      icon.style.display="none"; img.style.display="block"; img.src=URL.createObjectURL(file);
    } else {
      icon.style.display="inline"; img.style.display="none";
      icon.textContent = file.type==="application/pdf" ? "picture_as_pdf" : "description";
    }
    document.getElementById("file-preview-bar").style.display="block";
    textarea.focus();
  }
  function clearAttach() {
    attachedFile=null; document.getElementById("file-input").value="";
    document.getElementById("file-preview-bar").style.display="none";
  }

      for (const h of hist) { addUserMsg(h.question); addAiMsg(h.answer,h.id,true,false,h.rating||0); }

    } catch(e) { console.warn('Could not load learning path', e); }

    applyLearningPathChrome(pathData);

    if (!hist.length) {
      if (pathData && pathData.mode === 'sprint') {
        try {
          const br = await fetch('/api/sprint_bootstrap', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },

          });

    } catch(e){}

  //  УТИЛИТЫ

  function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }
  function esc(t) {
    const d=document.createElement("div"); d.textContent=String(t||''); return d.innerHTML;
  }

  function addUserMsg(text, imgSrc) {
    const d=document.createElement("div"); d.className="message user";
    if (text) d.innerHTML=`<div>${esc(text).replace(/\n/g,"<br>")}</div>`;
    if (imgSrc) { const img=document.createElement("img"); img.src=imgSrc; img.className="msg-img"; d.appendChild(img); }
    chatEl.appendChild(d); scrollDown(); return d;
  }

  function addAiMsg(rawText, historyId, withRating, animate=true, rating=0) {
    const d=document.createElement("div"); d.className=`message ai mode-${MODE}`;
    const textDiv=document.createElement("div"); textDiv.className="ai-text";
    d.appendChild(textDiv); chatEl.appendChild(d); scrollDown();
    const html   = mdToHtml(rawText);
    const doAnim = animate && (window._SH_anim_enabled !== false);
    if (doAnim) {
      animateText(textDiv, html, () => {
        textDiv.innerHTML=html;
        if (withRating && historyId) d.appendChild(makeStars(historyId,rating));
        if (window._SH_tts_enabled !== false)
          d.appendChild(TTS.makeBtn(rawText, 'action-btn explain-btn tts-inline'));
        scrollDown();
      });
    } else {
      textDiv.innerHTML=html;
      if (withRating && historyId) d.appendChild(makeStars(historyId,rating));
      if (window._SH_tts_enabled !== false)
        d.appendChild(TTS.makeBtn(rawText, 'action-btn explain-btn tts-inline'));
    }
    return d;
  }

  function addTyping() {
    const d=document.createElement("div"); d.className=`message ai mode-${MODE}`; d.id="typing";
    d.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div>`;
    chatEl.appendChild(d); scrollDown();

  function removeTyping() { document.getElementById("typing")?.remove(); }

  function showXP(amount=10) {
    if (window._SH_xp_enabled === false) return;
    const t=document.getElementById("xp-toast");
    t.textContent=`+${amount} XP ⭐`; t.style.display="block";
    t.style.background=`linear-gradient(135deg,${M.color},var(--accent3))`;

  // ══════════════════════════════════════════════
  //  ОТПРАВКА
  // ══════════════════════════════════════════════
  async function askTutor(overrideText, submode) {
    const q       = overrideText || textarea.value.trim();
    const hasFile = !!attachedFile;
    if (!q && !hasFile) return;
    if (!USER_ID) { location.href="/login"; return; }

    lastQ = q || "";
    if (!overrideText) {
      const imgSrc = (hasFile && attachedFile.type.startsWith("image/")) ? URL.createObjectURL(attachedFile) : null;
      addUserMsg(q, imgSrc);
      if (hasFile && !attachedFile.type.startsWith("image/")) {
        const chip=document.createElement("div"); chip.className="message user file-chip";
        chip.innerHTML=`<span class="material-icons">description</span> ${esc(attachedFile.name)}`;
        chatEl.appendChild(chip); scrollDown();
      }
      textarea.value=""; textarea.style.height="auto";
    }

    sendBtn.disabled=true; addTyping();
    if (window.Fairik) Fairik.think();
    const fd=new FormData();
    fd.append("question", q||"[файл без текста]");
    // Передаём submode из чата (фиксированный), либо из аргумента, либо из examSubmode
    const effectiveSubmode = submode || SUBMODE || (MODE==="exam"?examSubmode:"");
    fd.append("submode", effectiveSubmode);
    if (hasFile) fd.append("file", attachedFile);
    clearAttach();

    try {
      const res  = await fetch("/ask",{method:"POST",credentials:"include",body:fd});
      const data = await res.json();
      removeTyping(); sendBtn.disabled=false;
      if (window.Fairik) Fairik.doneThinking();
      if (data.error) { addAiMsg("⚠️ "+esc(data.error),null,false,false); return; }

      // Обновляем XP/стрик
      if (data.xp    !== undefined) userSettings.xp    = data.xp;
      if (data.level !== undefined) userSettings.level = data.level;
      if (data.streak!== undefined) userSettings.streak= data.streak;

      // Обновляем баннер пути если сервер вернул данные
      if (data.learning_path) {
        window._activePath = data.learning_path;
        renderPathBanner(data.learning_path);
        applyLearningPathChrome(data.learning_path);
      }

      showXP(10);
      if (window.Fairik) Fairik.addXP(10);

      sessionQuestions++;
      updateDailyGoalBar();

      if      (MODE==="explain") renderExplain(data);
      else if (MODE==="step")    renderStep(data);
      else if (MODE==="quiz")    renderQuiz(data, q);
      else if (MODE==="exam") {
        if (SUBMODE === "explain_tasks") renderExplainTask(data, null);
        else                             renderExam(data, q);
      }
      else                       addAiMsg(data.answer,data.question_id,true,true);
    } catch(err) {
      removeTyping(); sendBtn.disabled=false;
      if(window.Fairik) Fairik.doneThinking();
      addAiMsg("❌ Ошибка соединения. Попробуй ещё раз.",null,false,false);
    }
  }

  async function sendQ(text, submode="") {
    const fd=new FormData();
    fd.append("question", text);
    fd.append("submode",  submode);
    const res  = await fetch("/ask",{method:"POST",credentials:"include",body:fd});
    const data = await res.json();
    // Обновляем путь если пришёл
    if (data.learning_path) {
      window._activePath = data.learning_path;
      renderPathBanner(data.learning_path);
      applyLearningPathChrome(data.learning_path);
    }
    return data;
  }

  // ══════════════════════════════════════════════
  //  РЕЖИМ: EXPLAIN
  // ══════════════════════════════════════════════
  function renderExplain(data) {
    const wrap=document.createElement("div"); wrap.className="message ai mode-explain";
    const textDiv=document.createElement("div"); textDiv.className="ai-text"; wrap.appendChild(textDiv);
    const btns=document.createElement("div"); btns.className="action-row"; btns.style.opacity="0";
    const actions=[
      {icon:"🔄",label:"Проще",          q:`Объясни максимально просто, как для ребёнка: ${lastQ}`},
      {icon:"🌍",label:"Пример",          q:`Приведи 2 конкретных примера из реальной жизни: ${lastQ}`},
      {icon:"🧩",label:"Аналогия",        q:`Объясни через необычную аналогию: ${lastQ}`},
      {icon:"❓",label:"Проверь меня",    q:`Задай 1 вопрос для проверки понимания: ${lastQ}`},
      {icon:"🔗",label:"Связи с темами",  q:`Как тема связана с другими: ${lastQ}`},
    ];
    actions.forEach(a=>{
      const b=document.createElement("button"); b.className="action-btn explain-btn";
      b.innerHTML=`${a.icon} <span>${a.label}</span>`;
      b.onclick=()=>{
        btns.remove(); addUserMsg(a.icon+" "+a.label);
        sendBtn.disabled=true; addTyping();
        sendQ(a.q).then(d2=>{ removeTyping(); sendBtn.disabled=false; if(window.Fairik) Fairik.doneThinking(); renderExplain(d2); });
      };
      btns.appendChild(b);
    });
    btns.appendChild(TTS.makeBtn(data.answer));
    wrap.appendChild(btns);
    if (data.question_id) wrap.appendChild(makeStars(data.question_id));
    chatEl.appendChild(wrap); scrollDown();
    animateText(textDiv, mdToHtml(data.answer), () => {
      textDiv.innerHTML=mdToHtml(data.answer);
      btns.style.opacity="1"; btns.style.transition="opacity .4s"; scrollDown();
    });
  }

  // ══════════════════════════════════════════════
  //  РЕЖИМ: STEP
  // ══════════════════════════════════════════════
  function updateStepProgress() {
    document.getElementById("spb-num").textContent=stepState.num;
    document.getElementById("spb-task").textContent=stepState.task.substring(0,30)+(stepState.task.length>30?"…":"");
    const dots=document.getElementById("spb-dots"); dots.innerHTML="";
    for(let i=1;i<=stepState.maxSteps;i++){
      const d=document.createElement("div");
      d.className="spb-dot"+(i<stepState.num?" done":i===stepState.num?" active":"");
      dots.appendChild(d);
    }
  }

  function renderStep(data) {
    const isFirst=stepState.num===0||stepState.done;
    if(isFirst) stepState={num:1,task:lastQ,maxSteps:8,done:false}; else stepState.num++;
    updateStepProgress();

    const wrap=document.createElement("div"); wrap.className="message ai mode-step";
    const isAnswer=/^\*?\*?ответ\s*[:：]/i.test(data.answer.trim())||data.answer.toLowerCase().includes("**ответ:**");
    const badge=document.createElement("div"); badge.className="step-badge";
    if(isAnswer){ badge.textContent="✅ Решение"; badge.style.cssText="background:rgba(0,255,136,.15);color:var(--accent);border-color:rgba(0,255,136,.3)"; stepState.done=true; }
    else badge.textContent=`Шаг ${stepState.num}`;
    wrap.appendChild(badge);
    const textDiv=document.createElement("div"); textDiv.className="ai-text"; wrap.appendChild(textDiv);
    const btns=document.createElement("div"); btns.className="action-row"; btns.style.opacity="0";

    if(isAnswer||stepState.done){
      const nb=document.createElement("button"); nb.className="action-btn step-btn step-done-btn";
      nb.innerHTML="🏁 <span>Новая задача</span>";
      nb.onclick=()=>{ stepState={num:0,task:"",maxSteps:8,done:false}; updateStepProgress(); if(window.Fairik) Fairik.happy('Задача решена! 🎉'); addAiMsg("Отлично! 🎉 Напиши следующую задачу.",null,false,false); };
      btns.appendChild(nb);
      const sb=document.createElement("button"); sb.className="action-btn step-btn";
      sb.innerHTML="📝 <span>Похожая задача</span>";
      sb.onclick=()=>{ btns.remove(); const t=stepState.task||lastQ; stepState={num:0,task:"",maxSteps:8,done:false};
        addUserMsg("📝 Похожая задача"); sendBtn.disabled=true; addTyping();
        sendQ(`Придумай похожую задачу на: ${t}. Только задачу, без решения.`)
          .then(d2=>{ removeTyping(); sendBtn.disabled=false; if(window.Fairik) Fairik.doneThinking(); addAiMsg(d2.answer,d2.question_id,false,true); }); };
      btns.appendChild(sb);
    } else {
      [{icon:"✅",label:"Понял, следующий шаг",fn:()=>{
          btns.remove(); addUserMsg("✅ Понял, следующий шаг"); sendBtn.disabled=true; addTyping();

  function updateQuizScore() {
    document.getElementById("qs-correct").textContent=quizState.correct;
    document.getElementById("qs-wrong").textContent=quizState.wrong;
    document.getElementById("qs-num").textContent=quizState.num;
    document.getElementById("qs-progress").style.width=(((quizState.num-1)/quizState.total)*100)+"%";
  }

  function renderQuiz(data, originalQ) {
    if(originalQ&&!originalQ.startsWith("__NEXT__")) {
      quizState.topic=originalQ;
      quizState.askedQuestions=[];
      if(window.Fairik && quizState.num===1) Fairik.quizStart();
    }
    let parsed=null;
    try{ const m=data.answer.match(/\{[\s\S]*\}/); if(m) parsed=JSON.parse(m[0]); }catch(e){}
    if(!parsed||!parsed.question||!parsed.options){ addAiMsg(data.answer,data.question_id,false,true); return; }

    quizState.askedQuestions.push(parsed.question.substring(0, 80));

    const wrap=document.createElement("div"); wrap.className="message ai mode-quiz";
    const card=document.createElement("div"); card.className="quiz-card";
    card.innerHTML=`<div class="quiz-q-header"><span class="quiz-q-num">Вопрос ${quizState.num} из ${quizState.total}</span><span class="quiz-q-topic">${esc(quizState.topic)}</span></div><div class="quiz-question">${esc(parsed.question)}</div>`;

    const opts=document.createElement("div"); opts.className="quiz-options";
    parsed.options.forEach((opt,idx)=>{
      const btn=document.createElement("button"); btn.className="quiz-opt-btn";
      btn.innerHTML=`<span class="opt-letter">${["A","B","C","D"][idx]}</span><span class="opt-text">${esc(opt)}</span>`;
      btn.onclick=()=>{
        opts.querySelectorAll(".quiz-opt-btn").forEach(b=>b.disabled=true);
        const isOk=(idx===parsed.correct_index);
        btn.classList.add(isOk?"correct":"wrong");
        opts.querySelectorAll(".quiz-opt-btn")[parsed.correct_index]?.classList.add("correct");
        if(isOk){
          quizState.correct++;
          if(window.Fairik) Fairik.happy();
        } else {
          quizState.wrong++;
          if(window.Fairik) Fairik.sad();
          fetch('/api/memory/add_error',{
            method:'POST',credentials:'include',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              subject: SUBJECT,
              topic:   quizState.topic || lastQ,
              details: `Неверный ответ: ${parsed.options[idx]}. Верно: ${parsed.options[parsed.correct_index]}`
            })
          }).catch(()=>{});
        }
        updateQuizScore();

        const expl=document.createElement("div"); expl.className=`quiz-expl ${isOk?"ok":"fail"}`;
        expl.innerHTML=isOk?`<b>✅ Правильно!</b> ${esc(parsed.explanation||"")}`:`<b>❌ Неверно.</b> Правильно: <b>${esc(parsed.options[parsed.correct_index])}</b>. ${esc(parsed.explanation||"")}`;
        card.appendChild(expl);

        const ttsBtn=TTS.makeBtn(parsed.explanation||parsed.question,'action-btn quiz-action-btn');
        ttsBtn.style.marginTop="8px"; card.appendChild(ttsBtn);

        const total=quizState.correct+quizState.wrong;
        if(total>=quizState.total){
          const fb=document.createElement("button"); fb.className="quiz-next-btn"; fb.textContent="🏆 Итог"; fb.onclick=()=>{fb.remove();showQuizResult();}; card.appendChild(fb);
        } else {
          quizState.num++;
          const nb=document.createElement("button"); nb.className="quiz-next-btn"; nb.textContent="➡ Следующий вопрос";
          nb.onclick=()=>{
            nb.remove(); sendBtn.disabled=true; addTyping();
            const askedStr = quizState.askedQuestions.length
              ? `\nУЖЕ СПРОШЕНО (не повторяй): ${quizState.askedQuestions.join(" | ")}`
              : "";
            sendQ(`__NEXT__ Задай новый вопрос по теме "${quizState.topic}". Только JSON.${askedStr}`)
              .then(d2=>{ removeTyping(); sendBtn.disabled=false; if(window.Fairik) Fairik.doneThinking(); renderQuiz(d2,null); });
          };
          card.appendChild(nb);
        }
      };
      opts.appendChild(btn);
    });
    card.appendChild(opts); wrap.appendChild(card); chatEl.appendChild(wrap); scrollDown();
  }

  function showQuizResult() {
    const total=quizState.correct+quizState.wrong;
    const pct=Math.round(quizState.correct/total*100);
    const g=pct>=80?{icon:"🏆",text:"Отлично!",color:"var(--accent)"}:pct>=60?{icon:"👍",text:"Хорошо!",color:"var(--blue)"}:{icon:"📚",text:"Нужно повторить",color:"var(--warning)"};
    const wrap=document.createElement("div"); wrap.className="message ai mode-quiz";
    wrap.innerHTML=`<div class="quiz-result"><div class="qr-icon">${g.icon}</div><div class="qr-score" style="color:${g.color}">${quizState.correct}/${total}</div><div class="qr-pct">${pct}% · ${g.text}</div><div class="qr-bar-wrap"><div class="qr-bar-fill" style="width:${pct}%;background:${g.color}"></div></div><div class="qr-detail">Правильных: ${quizState.correct} · Ошибок: ${quizState.wrong}</div><div class="action-row" style="justify-content:center;margin-top:16px;"><button class="action-btn quiz-action-btn" onclick="restartQuiz()">🔄 Новая тема</button><button class="action-btn quiz-action-btn" onclick="retryQuiz()">🔁 Та же тема</button></div></div>`;
    chatEl.appendChild(wrap); scrollDown();
    document.getElementById("qs-progress").style.width="100%";
    if(window.Fairik && pct>=80) Fairik.celebrate();
    if(pct < 60) {
      fetch('/api/memory/analyze', {method:'POST', credentials:'include'}).catch(()=>{});
    }
  }
  function restartQuiz(){ quizState={correct:0,wrong:0,num:1,topic:"",total:5,askedQuestions:[]}; updateQuizScore(); addAiMsg("Напиши новую тему 🎯",null,false,false); }
  function retryQuiz(){ const t=quizState.topic; quizState={correct:0,wrong:0,num:1,topic:t,total:5,askedQuestions:[]}; updateQuizScore();
    addUserMsg(`Повторить: ${t}`); sendBtn.disabled=true; addTyping();
    sendQ(`Задай вопрос по теме "${t}". Только JSON.`).then(d=>{ removeTyping(); sendBtn.disabled=false; renderQuiz(d,t); }); }

  function setExamSubmode(sub) {
    examSubmode=sub;
    ["explain","practice","full"].forEach(s=>document.getElementById(`btn-${s}`).classList.toggle("active",s===sub));
    const msgs={
      explain:  `📖 Разбор формата ЕГЭ/ОГЭ по ${SUBJECT}. Напиши тему или задай вопрос.`,
      practice: `🎯 Тренировка заданий в перемешку. Напиши тему или номер задания ЕГЭ.`,
      full:     `⏱ Полный экзамен с таймером 3:55. Напиши <b>начать</b> когда готов.`,
    };
    let hint=document.getElementById("exam-hint-msg");
    if(!hint){ hint=document.createElement("div"); hint.id="exam-hint-msg"; hint.className="message ai mode-exam"; hint.innerHTML=`<div class="ai-text"></div>`; chatEl.appendChild(hint); }
    hint.querySelector(".ai-text").innerHTML=msgs[sub]||msgs.explain;
    scrollDown();
    const epb=document.getElementById("exam-progress-bar");
    if(sub==="practice"||sub==="full"){
      epb.style.display="flex"; examState.taskNum=1;
      examState.maxTasks=sub==="full"?27:10;
      document.getElementById("epb-total").textContent=examState.maxTasks; renderExamDots();
      document.getElementById("exam-timer").style.display=sub==="full"?"flex":"none";
    } else epb.style.display="none";
  }
  function renderExamDots(){
    const dots=document.getElementById("epb-dots"); dots.innerHTML="";
    const show=Math.min(examState.maxTasks,10);
    for(let i=1;i<=show;i++){
      const d=document.createElement("div");
      d.className="epb-dot"+(i<examState.taskNum?" done":i===examState.taskNum?" active":"");
      dots.appendChild(d);
    }
    document.getElementById("epb-num").textContent=examState.taskNum;
  }
  function startExamTimer(){
    const el=document.getElementById("timer-val"); examState.seconds=3*3600+55*60;
    examState.timerInterval=setInterval(()=>{
      examState.seconds--;
      if(examState.seconds<=0){clearInterval(examState.timerInterval);finishFullExam();return;}
      const h=Math.floor(examState.seconds/3600),mm=Math.floor((examState.seconds%3600)/60),ss=examState.seconds%60;
      el.textContent=`${h}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
      if(examState.seconds<600) el.style.color="var(--danger)";
    },1000);
  }

  function renderExam(data, originalQ) {
    if(originalQ&&!originalQ.startsWith("__NEXT_TASK__")) examState.topic=originalQ;
    if(examSubmode==="explain"){ renderExamExplain(data); return; }

    const wrap=document.createElement("div"); wrap.className="message ai mode-exam";
    const card=document.createElement("div"); card.className="exam-card";
    const taskLabel=examSubmode==="full"?`Задание ${examState.taskNum} из ${examState.maxTasks}`:`Задание ${examState.taskNum}`;
    card.innerHTML=`<div class="exam-header"><span class="exam-badge">📋 ${taskLabel}</span><span class="exam-subject">${esc(SUBJECT)}</span></div>`;
    const taskDiv=document.createElement("div"); taskDiv.className="ai-text exam-task"; card.appendChild(taskDiv);

    const ansBlock=document.createElement("div"); ansBlock.className="exam-ans-block";
    const ans=document.createElement("textarea"); ans.className="exam-input"; ans.placeholder="Напиши свой ответ...";
    const checkBtn=document.createElement("button"); checkBtn.className="exam-check-btn"; checkBtn.innerHTML="✅ Проверить";
    checkBtn.onclick=()=>{
      const val=ans.value.trim(); if(!val){ans.focus();return;}
      checkBtn.disabled=true; ans.disabled=true; checkBtn.textContent="Проверяю...";
      const checkPrompt=examSubmode==="full"
        ?`Задание: ${data.answer}\nОтвет: ${val}\nПросто: правильно/неправильно.`
        :`Задание: ${data.answer}\n\nОтвет ученика: ${val}\n\nОцени по критериям ЕГЭ/ОГЭ: баллы, ошибки, как исправить.`;
      sendQ(checkPrompt,examSubmode).then(d2=>{
        checkBtn.remove();
        const txt=d2.answer.toLowerCase();
        const good=txt.includes("правильно")||txt.includes("верно")||txt.includes("балл");
        if(window.Fairik) { if(good) Fairik.happy(); else Fairik.encourage(); }
        const res=document.createElement("div"); res.className=`exam-result ${good?"good":"bad"}`;
        const rDiv=document.createElement("div"); rDiv.className="er-text"; res.innerHTML=`<div class="er-icon">${good?"✅":"❌"}</div>`;
        res.appendChild(rDiv); ansBlock.appendChild(res);
        animateText(rDiv,mdToHtml(d2.answer),()=>{ rDiv.innerHTML=mdToHtml(d2.answer); scrollDown(); });

        const ttsRow=document.createElement("div"); ttsRow.className="action-row"; ttsRow.style.marginTop="8px";
        ttsRow.appendChild(TTS.makeBtn(d2.answer,'action-btn exam-btn'));
        ansBlock.appendChild(ttsRow);

        if(!good && examState.topic) {
          fetch('/api/memory/add_error',{
            method:'POST',credentials:'include',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({subject:SUBJECT, topic:examState.topic, details:`Экзаменационное задание: неверный ответ`})
          }).catch(()=>{});
        }

        const btnRow=document.createElement("div"); btnRow.className="action-row";
        if(examState.taskNum<examState.maxTasks){
          const nb=document.createElement("button"); nb.className="action-btn exam-btn"; nb.innerHTML="➡ Следующее задание";
          nb.onclick=()=>{ btnRow.remove(); examState.taskNum++; renderExamDots(); sendBtn.disabled=true; addTyping();
            sendQ(`__NEXT_TASK__ Задание по ${SUBJECT} в формате ЕГЭ/ОГЭ по теме "${examState.topic}". Другой тип.`,examSubmode)
              .then(d3=>{ removeTyping(); sendBtn.disabled=false; renderExam(d3,null); }); };
          btnRow.appendChild(nb);
        } else {
          const db=document.createElement("button"); db.className="action-btn exam-btn exam-done-btn"; db.innerHTML="🏆 Итог сессии";
          db.onclick=()=>{btnRow.remove();finishExamSession();}; btnRow.appendChild(db);
        }
        if(examSubmode==="practice"){
          const hb=document.createElement("button"); hb.className="action-btn exam-btn-secondary"; hb.innerHTML="💡 Эталонный ответ";
          hb.onclick=()=>{ hb.remove(); addTyping();
            sendQ(`Эталонный ответ на: ${data.answer}`,"practice").then(d3=>{ removeTyping(); addAiMsg(d3.answer,d3.question_id,false,true); }); };
          btnRow.appendChild(hb);
        }
        ansBlock.appendChild(btnRow);
      });
    };
    ansBlock.appendChild(ans); ansBlock.appendChild(checkBtn);
    card.appendChild(ansBlock); wrap.appendChild(card); chatEl.appendChild(wrap); scrollDown();
    animateText(taskDiv,mdToHtml(data.answer),()=>{ taskDiv.innerHTML=mdToHtml(data.answer); setTimeout(()=>ans.focus(),50); scrollDown(); });
    if(examSubmode==="full"&&examState.taskNum===1&&!examState.timerInterval) startExamTimer();
  }

  function renderExamExplain(data){
    const wrap=document.createElement("div"); wrap.className="message ai mode-exam";
    const textDiv=document.createElement("div"); textDiv.className="ai-text"; wrap.appendChild(textDiv);
    const btns=document.createElement("div"); btns.className="action-row"; btns.style.opacity="0";
    [{icon:"📊",label:"Критерии оценки",q:`Критерии оценивания ЕГЭ/ОГЭ по ${SUBJECT}`},
     {icon:"⚠️",label:"Типичные ошибки",q:`Типичные ошибки ЕГЭ/ОГЭ по ${SUBJECT}`},
     {icon:"📅",label:"Стратегия сдачи",q:`Стратегия распределения времени на ЕГЭ/ОГЭ по ${SUBJECT}`},
     {icon:"🎯",label:"Начать тренировку",q:null},
    ].forEach(a=>{
      const b=document.createElement("button"); b.className="action-btn exam-btn";
      b.innerHTML=`${a.icon} <span>${a.label}</span>`;
      b.onclick=()=>{ if(!a.q){setExamSubmode("practice");return;}
        btns.remove(); addUserMsg(a.icon+" "+a.label); sendBtn.disabled=true; addTyping();
        sendQ(a.q,"explain").then(d2=>{ removeTyping(); sendBtn.disabled=false; renderExamExplain(d2); }); };
      btns.appendChild(b);
    });
    btns.appendChild(TTS.makeBtn(data.answer,'action-btn exam-btn'));
    wrap.appendChild(btns); chatEl.appendChild(wrap); scrollDown();
    animateText(textDiv,mdToHtml(data.answer),()=>{ textDiv.innerHTML=mdToHtml(data.answer); btns.style.opacity="1"; btns.style.transition="opacity .4s"; scrollDown(); });
  }

  function finishExamSession(){
    clearInterval(examState.timerInterval); addTyping();
    sendQ(examSubmode==="full"?`Итоги экзамена по ${SUBJECT}, примерный балл.`:`Итоги тренировки по ${SUBJECT}.`,examSubmode)
      .then(d=>{ removeTyping(); addAiMsg(d.answer,d.question_id,false,true); });
    examState.taskNum=1; renderExamDots();
  }
  function finishFullExam(){ addAiMsg("⏰ Время вышло!",null,false,false); finishExamSession(); }

  // ── Звёзды ──
  function makeStars(historyId,rating=0){
    const stars=document.createElement("div"); stars.className="rating-stars";
    for(let i=1;i<=5;i++){
      const s=document.createElement("span"); s.textContent="★";
      if(i<=(rating||0)) s.classList.add("rated");
      s.onclick=()=>{ rateAnswer(historyId,i); stars.querySelectorAll("span").forEach((el,idx)=>el.classList.toggle("rated",idx<i)); stars.style.pointerEvents="none"; };
      stars.appendChild(s);
    }
    return stars;
  }

  async function rateAnswer(hid, rating){
    try{ await fetch("/rate",{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify({history_id:hid,rating})}); }catch(e){}
    if(rating <= 2) {
      if(window.Fairik) Fairik.encourage();
      if(lastQ){
        fetch('/api/memory/add_error',{
          method:'POST',credentials:'include',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({subject:SUBJECT, topic:lastQ.substring(0,120), details:'Низкая оценка ответа: '+rating+'/5'})
        }).catch(()=>{});
      }
    }
  }

  function getExamTaskCount() {
    const cfg = EXAM_TASK_COUNTS[SUBJECT] || { oge:20, ege:25 };
    if (CLASS <= 9) return cfg.oge || 20;
    if (SUBJECT === "Математика") {
      return MATH_LEVEL === "basic" ? (cfg.ege_basic || 20) : (cfg.ege_profile || 27);
    }
    return cfg.ege || 25;
  }

  function getExamPart1End() {
    const cfg = EXAM_PART1_END[SUBJECT];
    if (!cfg) return Math.ceil(getExamTaskCount() * 0.65);
    if (CLASS <= 9) return cfg.oge || 15;
    if (SUBJECT === "Математика" && MATH_LEVEL === "basic") return cfg.ege_basic || 15;
    return cfg.ege || Math.ceil(getExamTaskCount() * 0.65);
  }

  function buildTaskNumberGrid() {
    const container = document.getElementById('examTaskNumbers');
    if (!container) return;
    const total  = getExamTaskCount();
    const part1  = getExamPart1End();
    container.innerHTML = '';

    function makeSection(label, from, to, extraClass) {
      const h = document.createElement('div');
      h.className = 'etg-part-label' + (extraClass ? ' ' + extraClass : '');
      h.textContent = label;
      container.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'etg-grid';
      for (let i = from; i <= to; i++) {
        const btn = document.createElement('button');
        btn.className = 'etg-num-btn';
        btn.textContent = i;
        btn.title = `Задание ${i}`;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.etg-num-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          sendExplainTaskRequest(i);
        });
        grid.appendChild(btn);
      }
      container.appendChild(grid);
    }

    makeSection('📝 Часть 1', 1, part1, '');
    if (part1 < total) makeSection('📚 Часть 2', part1 + 1, total, 'etg-part2');
  }

  async function sendExplainTaskRequest(num) {
    addUserMsg(`Задание ${num}`);
    sendBtn.disabled = true; addTyping();
    if (window.Fairik) Fairik.think();
    const fd = new FormData();
    fd.append('question', `Задание ${num}`);
    fd.append('submode',  'explain_tasks');
    try {
      const res  = await fetch('/ask', { method:'POST', credentials:'include', body:fd });
      const data = await res.json();
      removeTyping(); sendBtn.disabled = false;
      if (window.Fairik) Fairik.doneThinking();
      if (data.error) { addAiMsg('⚠️ ' + esc(data.error), null, false, false); return; }
      if (data.xp !== undefined) userSettings.xp = data.xp;
      showXP(10);
      if (window.Fairik) Fairik.addXP(10);
      sessionQuestions++; updateDailyGoalBar();
      renderExplainTask(data, num);
    } catch(e) {
      removeTyping(); sendBtn.disabled = false;
      if (window.Fairik) Fairik.doneThinking();
      addAiMsg('❌ Ошибка соединения. Попробуй ещё раз.', null, false, false);
    }
  }

  function renderExplainTask(data, taskNum) {
    const examLabel  = CLASS <= 9 ? 'ОГЭ' : 'ЕГЭ';
    const mathSuffix = MATH_LEVEL === 'basic'   ? ' (база)'
                     : MATH_LEVEL === 'profile' ? ' (профиль)' : '';

    const wrap    = document.createElement('div'); wrap.className = 'message ai mode-exam';
    const badge   = document.createElement('div'); badge.className = 'step-badge';
    badge.style.cssText = 'background:rgba(255,179,71,.1);color:var(--warning);'
      + 'border:1px solid rgba(255,179,71,.3);border-bottom:none;border-radius:8px 8px 0 0;'
      + 'display:block;padding:6px 14px;font-size:.78rem;font-weight:700;width:100%;';
    badge.textContent = taskNum
      ? `📖 Задание №${taskNum} · ${examLabel} · ${SUBJECT}${mathSuffix}`
      : `📖 ${examLabel} · ${SUBJECT}${mathSuffix}`;
    wrap.appendChild(badge);

    const textDiv = document.createElement('div'); textDiv.className = 'ai-text'; wrap.appendChild(textDiv);
    const btns    = document.createElement('div'); btns.className = 'action-row'; btns.style.opacity = '0';

    if (taskNum) {
      // Кнопка «Другое задание этого типа»
      const b1 = document.createElement('button'); b1.className = 'action-btn exam-btn';
      b1.innerHTML = '🔄 <span>Другой вариант</span>';
      b1.onclick = () => {
        btns.remove();
        addUserMsg('🔄 Дай другое задание этого типа');
        sendBtn.disabled = true; addTyping();
        const fd = new FormData();
        fd.append('question', `Задание ${taskNum}, другой вариант условия. Только типичное задание, разбор, ошибки, лайфхак.`);
        fd.append('submode', 'explain_tasks');
        fetch('/ask', { method:'POST', credentials:'include', body:fd })
          .then(r => r.json())
          .then(d2 => { removeTyping(); sendBtn.disabled = false; renderExplainTask(d2, taskNum); });
      };
      btns.appendChild(b1);

      // Кнопка «Попробовать самому»
      const b2 = document.createElement('button'); b2.className = 'action-btn exam-btn';
      b2.innerHTML = '✏️ <span>Попробовать самому</span>';
      b2.onclick = () => {
        btns.remove();
        addUserMsg('✏️ Дай задание для самостоятельного решения');
        sendBtn.disabled = true; addTyping();
        const fd = new FormData();
        fd.append('question', `Задание ${taskNum} ${examLabel} по ${SUBJECT}${mathSuffix}: дай только условие без ответа. Чуть другое условие.`);
        fd.append('submode', 'practice');
        fetch('/ask', { method:'POST', credentials:'include', body:fd })
          .then(r => r.json())
          .then(d2 => {
            removeTyping(); sendBtn.disabled = false;
            renderSelfPracticeTask(d2, taskNum);
          });
      };
      btns.appendChild(b2);
    }

    btns.appendChild(TTS.makeBtn(data.answer, 'action-btn exam-btn'));
    wrap.appendChild(btns);
    if (data.question_id) wrap.appendChild(makeStars(data.question_id));
    chatEl.appendChild(wrap); scrollDown();
    animateText(textDiv, mdToHtml(data.answer), () => {
      textDiv.innerHTML = mdToHtml(data.answer);
      btns.style.opacity = '1'; btns.style.transition = 'opacity .4s'; scrollDown();
    });
  }

  function renderSelfPracticeTask(data, taskNum) {
    const examLabel  = CLASS <= 9 ? 'ОГЭ' : 'ЕГЭ';
    const mathSuffix = MATH_LEVEL === 'basic' ? ' (база)' : MATH_LEVEL === 'profile' ? ' (профиль)' : '';

    const wrap    = document.createElement('div'); wrap.className = 'message ai mode-exam';
    const badge   = document.createElement('div'); badge.className = 'step-badge';
    badge.style.cssText = 'background:rgba(77,159,255,.1);color:var(--blue);border:1px solid rgba(77,159,255,.3);'
      + 'border-bottom:none;border-radius:8px 8px 0 0;display:block;padding:6px 14px;font-size:.78rem;font-weight:700;width:100%;';
    badge.textContent = `✏️ Задание №${taskNum} — попробуй сам`;
    wrap.appendChild(badge);

    const taskDiv = document.createElement('div'); taskDiv.className = 'ai-text exam-task'; wrap.appendChild(taskDiv);
    const ansBlock = document.createElement('div'); ansBlock.className = 'exam-ans-block';
    const ans = document.createElement('textarea'); ans.className = 'exam-input'; ans.placeholder = 'Напиши своё решение...';
    const checkBtn = document.createElement('button'); checkBtn.className = 'exam-check-btn'; checkBtn.innerHTML = '✅ Проверить';

    checkBtn.onclick = () => {
      const val = ans.value.trim(); if (!val) { ans.focus(); return; }
      checkBtn.disabled = true; ans.disabled = true; checkBtn.textContent = 'Проверяю...';
      const fd = new FormData();
      fd.append('question', `Задание ${taskNum} ${examLabel} по ${SUBJECT}${mathSuffix}:\n${data.answer}\n\nОтвет ученика: ${val}\n\nПроверь по критериям, укажи ошибки и дай разбор.`);
      fd.append('submode', 'explain_tasks');
      fetch('/ask', { method:'POST', credentials:'include', body:fd }).then(r => r.json()).then(d2 => {
        checkBtn.remove();
        const good = d2.answer.toLowerCase().includes('правильно') || d2.answer.includes('✅');
        if (window.Fairik) good ? Fairik.happy() : Fairik.sad();
        const res = document.createElement('div'); res.className = `exam-result ${good ? 'good' : 'bad'}`;
        const rDiv = document.createElement('div'); rDiv.className = 'er-text';
        res.innerHTML = `<div class="er-icon">${good ? '✅' : '❌'}</div>`;
        res.appendChild(rDiv); ansBlock.appendChild(res);
        ansBlock.appendChild(TTS.makeBtn(d2.answer, 'action-btn exam-btn'));
        animateText(rDiv, mdToHtml(d2.answer), () => { rDiv.innerHTML = mdToHtml(d2.answer); scrollDown(); });
        if (!good && taskNum) fetch('/api/memory/add_error', {
          method:'POST', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ subject:SUBJECT, topic:`Задание №${taskNum} ${examLabel}`, details:'Ошибка при самостоятельном решении' })
        }).catch(() => {});
      });
    };

    ansBlock.appendChild(ans); ansBlock.appendChild(checkBtn);
    wrap.appendChild(ansBlock); chatEl.appendChild(wrap); scrollDown();
    animateText(taskDiv, mdToHtml(data.answer), () => {
      taskDiv.innerHTML = mdToHtml(data.answer);
      setTimeout(() => ans.focus(), 50); scrollDown();
    });
  }

  // ── Голосовой ввод ──
  const voiceBtn=document.getElementById("voice-btn");
  if("webkitSpeechRecognition" in window||"SpeechRecognition" in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR(); rec.lang="ru-RU"; rec.interimResults=false;
    voiceBtn.addEventListener("click",()=>{ if(voiceBtn.classList.contains("recording")){rec.stop();return;} voiceBtn.classList.add("recording"); rec.start(); });
    rec.onresult=e=>{ textarea.value+=e.results[0][0].transcript+" "; voiceBtn.classList.remove("recording"); textarea.focus(); };
    rec.onerror=()=>voiceBtn.classList.remove("recording");
    rec.onend=()=>voiceBtn.classList.remove("recording");
  } else { voiceBtn.style.display="none"; }
  </script>
