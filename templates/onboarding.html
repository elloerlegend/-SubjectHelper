<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SubjectHelper — Добро пожаловать!</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='avatar.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='back.css') }}">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── Прогресс-бар вверху ── */
    .ob-progress-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--surface2);
      z-index: 100;
    }
    .ob-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      transition: width 0.5s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ── Шаги-точки ── */
    .ob-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .ob-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border2);
      transition: all 0.3s;
    }
    .ob-dot.done  { background: var(--accent); }
    .ob-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

    /* ── Карточка шага ── */
    .ob-card {
      width: 100%;
      max-width: 520px;
      animation: obSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes obSlideIn {
      from { opacity:0; transform: translateY(24px) scale(0.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes obSlideOut {
      from { opacity:1; transform: translateY(0); }
      to   { opacity:0; transform: translateY(-20px); }
    }

    /* Файрик на шаге */
    .ob-fairik {
      text-align: center;
      margin-bottom: 20px;
    }
    .ob-fairik svg {
      width: 80px; height: 96px;
      filter: drop-shadow(0 8px 20px rgba(78,205,196,.35));
      animation: obFairikFloat 3s ease-in-out infinite;
    }
    @keyframes obFairikFloat {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    /* Пузырь */
    .ob-bubble {
      display: inline-block;
      background: rgba(255,255,255,0.97);
      color: #1a1a2e;
      padding: 10px 16px;
      border-radius: 18px 18px 18px 4px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      max-width: 260px;
      box-shadow: 0 6px 24px rgba(0,0,0,.2);
      margin-bottom: 4px;
      position: relative;
    }
    .ob-bubble::after {
      content: '';
      position: absolute;
      bottom: -7px; left: 16px;
      border: 5px solid transparent;
      border-top-color: rgba(255,255,255,.97);
    }

    /* Заголовок */
    .ob-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 6px;
      text-align: center;
      line-height: 1.25;
    }
    .ob-sub {
      font-size: 0.85rem;
      color: var(--text3);
      text-align: center;
      margin-bottom: 24px;
      font-family: var(--font-mono);
    }

    /* ── Поле ввода имени ── */
    .ob-name-input {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border: 2px solid var(--border2);
      border-radius: 14px;
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      font-family: var(--font-main);
      margin-bottom: 16px;
    }
    .ob-name-input:focus { border-color: var(--accent); }
    .ob-name-input::placeholder { color: var(--text3); font-weight: 400; }

    /* ── Сетка выбора ── */
    .ob-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .ob-chip {
      padding: 10px 18px;
      border-radius: 50px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      color: var(--text2);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
      font-family: var(--font-main);
    }
    .ob-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .ob-chip.selected {
      border-color: var(--accent);
      background: rgba(0,255,136,0.1);
      color: var(--accent);
      box-shadow: 0 0 14px rgba(0,255,136,0.15);
    }
    .ob-chip.selected-purple {
      border-color: var(--purple);
      background: rgba(167,139,250,0.1);
      color: var(--purple);
    }

    /* ── Выбор класса — числа ── */
    .ob-class-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .ob-class-btn {
      aspect-ratio: 1;
      border-radius: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      color: var(--text2);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-main);
    }
    .ob-class-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }
    .ob-class-btn.selected {
      border-color: var(--accent);
      background: rgba(0,255,136,0.12);
      color: var(--accent);
      box-shadow: 0 0 16px rgba(0,255,136,0.2);
      transform: scale(1.08);
    }

    /* ── Карточки с иконками ── */
    .ob-big-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .ob-big-card {
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 16px;
      padding: 16px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: var(--font-main);
    }
    .ob-big-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.2); }
    .ob-big-card.selected { border-color: var(--accent); background: rgba(0,255,136,0.07); }
    .ob-big-card.selected-blue { border-color: var(--blue); background: rgba(79,195,247,0.07); }
    .ob-big-card .bc-icon { font-size: 2rem; margin-bottom: 8px; }
    .ob-big-card .bc-name { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .ob-big-card .bc-desc { font-size: 0.72rem; color: var(--text3); line-height: 1.4; font-family: var(--font-mono); }
    .ob-big-card.selected .bc-name { color: var(--accent); }
    .ob-big-card.selected-blue .bc-name { color: var(--blue); }

    /* ── Слайдер времени ── */
    .ob-time-wrap { margin-bottom: 20px; }
    .ob-time-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .ob-time-btn {
      flex: 1; max-width: 120px;
      padding: 14px 10px;
      border-radius: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      font-family: var(--font-main);
    }
    .ob-time-btn:hover { border-color: var(--blue); transform: translateY(-2px); }
    .ob-time-btn.selected { border-color: var(--blue); background: rgba(79,195,247,0.08); }
    .ob-time-btn .tb-min { font-size: 1.4rem; font-weight: 800; color: var(--blue); }
    .ob-time-btn .tb-lbl { font-size: 0.7rem; color: var(--text3); font-family: var(--font-mono); }
    .ob-time-btn.selected .tb-min { color: var(--blue); }

    /* ── Кнопки навигации ── */
    .ob-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }
    .ob-btn-next {
      flex: 1;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      color: var(--bg);
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-main);
      letter-spacing: 0.02em;
    }
    .ob-btn-next:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,255,136,.35); }
    .ob-btn-next:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .ob-btn-back {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.18s;
      font-family: var(--font-main);
    }
    .ob-btn-back:hover { color: var(--text); border-color: var(--border); }

    /* ── Финальный экран ── */
    .ob-final {
      text-align: center;
    }
    .ob-final-fairik {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .ob-final-fairik svg {
      width: 120px; height: 144px;
      filter: drop-shadow(0 12px 32px rgba(78,205,196,.5));
      animation: obFairikFloat 2s ease-in-out infinite, obFinalPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes obFinalPop {
      from { transform: scale(0.3) rotate(-10deg); opacity:0; }
      to   { transform: scale(1) rotate(0); opacity:1; }
    }
    .ob-final h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .ob-final .ob-sub { margin-bottom: 20px; }
    .ob-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ob-sum-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
    }
    .ob-sum-key { color: var(--text3); font-family: var(--font-mono); min-width: 100px; }
    .ob-sum-val { color: var(--text); font-weight: 600; }
    .ob-sum-accent { color: var(--accent); font-weight: 700; }

    /* Частицы */
    .ob-confetti {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 999;
    }
    .ob-conf-dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: obConfFall linear forwards;
    }
    @keyframes obConfFall {
      0%   { opacity:1; transform: translateY(-20px) rotate(0); }
      100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
    }

    @media (max-width: 480px) {
      .ob-class-grid { grid-template-columns: repeat(4,1fr); }
      .ob-big-grid { grid-template-columns: 1fr; }
      .ob-title { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script src="{{ url_for('static', filename='themes.js') }}"></script>

<!-- Прогресс -->
<div class="ob-progress-wrap">
  <div class="ob-progress-fill" id="obProgress" style="width:0%"></div>
</div>

<!-- Confetti контейнер -->
<div class="ob-confetti" id="obConfetti"></div>

<!-- Точки -->
<div class="ob-dots" id="obDots"></div>

<!-- Контейнер шагов -->
<div id="obContainer" class="ob-card"></div>

<!-- Мини-SVG Файрика (используется в шагах) -->
<script>
const FAIRIK_SVG = `<svg viewBox="0 0 240 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ob_bd" cx="38%" cy="30%" r="62%">

    </radialGradient>
    <radialGradient id="ob_bl" cx="50%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#f2fffe"/><stop offset="50%" stop-color="#caf2ee"/>
      <stop offset="100%" stop-color="#8dd8d0"/>
    </radialGradient>
    <radialGradient id="ob_hd" cx="36%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#b8ece7"/><stop offset="40%" stop-color="#4db8ae"/>
      <stop offset="100%" stop-color="#1f7a70"/>
    </radialGradient>
    <radialGradient id="ob_ey" cx="30%" cy="25%" r="58%">
      <stop offset="0%" stop-color="#80d4f8"/><stop offset="30%" stop-color="#2196f3"/>
      <stop offset="65%" stop-color="#0d3b8a"/><stop offset="100%" stop-color="#050f2a"/>
    </radialGradient>
    <linearGradient id="ob_wm" x1="0%" y1="0%" x2="100%" y2="100%">

      <stop offset="0%" stop-color="#1a9d8f"/><stop offset="100%" stop-color="#e8f8f6"/>
    </linearGradient>
  </defs>
  <path d="M90 193 Q60 207 44 226 Q36 238 46 242 Q57 237 65 226 Q78 214 92 200Z" fill="url(#ob_bd)"/>
  <path d="M65 123 L16 76 L20 115 Z" fill="url(#ob_wm)"/>
  <path d="M65 123 L20 115 L12 148 Z" fill="url(#ob_wm)" opacity=".9"/>
  <path d="M175 123 L224 76 L220 115 Z" fill="url(#ob_wm)"/>
  <path d="M175 123 L220 115 L228 148 Z" fill="url(#ob_wm)" opacity=".9"/>
  <line x1="65" y1="123" x2="16" y2="76" stroke="#1a6b60" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="123" x2="12" y2="148" stroke="#1a6b60" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="175" y1="123" x2="224" y2="76" stroke="#1a6b60" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="123" x2="228" y2="148" stroke="#1a6b60" stroke-width="2.4" stroke-linecap="round"/>
  <ellipse cx="120" cy="178" rx="50" ry="62" fill="url(#ob_bd)"/>
  <ellipse cx="120" cy="183" rx="30" ry="46" fill="url(#ob_bl)" opacity=".9"/>
  <path d="M94 136 Q120 120 146 136 Q141 146 120 148 Q99 146 94 136Z" fill="url(#ob_bd)"/>
  <path d="M120 52 C138 54 158 62 164 78 C170 94 162 108 154 116 C146 122 134 126 120 128
           C106 126 94 122 86 116 C78 108 70 94 76 78 C82 62 102 54 120 52Z" fill="url(#ob_hd)"/>
  <path d="M90 60 Q84 36 90 22 Q95 32 96 48 Q96 56 90 60Z" fill="url(#ob_hr)"/>
  <path d="M150 60 Q156 36 150 22 Q145 32 144 48 Q144 56 150 60Z" fill="url(#ob_hr)"/>
  <path d="M104 50 Q103 41 106 37 Q108 43 106 50Z" fill="#4ecdc4" opacity=".85"/>
  <path d="M120 45 Q120 36 124 31 Q126 38 124 45Z" fill="#5eccc3"/>
  <path d="M136 50 Q138 41 141 38 Q142 44 140 50Z" fill="#3db5aa" opacity=".8"/>
  <path d="M120 108 C108 108 96 112 92 120 C89 127 94 134 102 138
           C108 141 114 142 120 142 C126 142 132 141 138 138
           C146 134 151 127 148 120 C144 112 132 108 120 108Z" fill="url(#ob_hd)"/>
  <ellipse cx="94" cy="95" rx="17" ry="18" fill="white"/>
  <ellipse cx="146" cy="95" rx="17" ry="18" fill="white"/>
  <circle cx="94" cy="96" r="13" fill="url(#ob_ey)"/>
  <circle cx="146" cy="96" r="13" fill="url(#ob_ey)"/>
  <circle cx="94" cy="97" r="7.5" fill="#04080f"/>
  <circle cx="146" cy="97" r="7.5" fill="#04080f"/>

// ══════════════════════════════════════════
//  ДАННЫЕ
// ══════════════════════════════════════════
const answers = {
  name: '', grade: null, goal: null,
  weakSubjects: [], interests: [], style: null,
  timePerDay: null, source: null,
};

// ══════════════════════════════════════════
//  ШАГИ
// ══════════════════════════════════════════
const STEPS = [
  // 0: Приветствие + имя
  {
    bubble: 'Привет! Я Файрик — твой личный дракончик-помощник! 🐉',
    title: 'Как тебя зовут?',
    sub: 'Буду обращаться по имени',
    render(container) {
      const inp = el('input', { type:'text', class:'ob-name-input', placeholder:'Введи своё имя...', maxlength:'20', id:'ob-name' });
      inp.addEventListener('input', () => updateNext());
      container.appendChild(inp);
      setTimeout(() => inp.focus(), 300);
    },
    validate() { return answers.name.length >= 2; },
    collect() { answers.name = document.getElementById('ob-name')?.value?.trim() || ''; },
  },

  // 1: Класс
  {
    bubble: (a) => `Отлично, ${a.name}! В каком ты классе?`,
    title: 'Твой класс',
    sub: 'Подберу объяснения под твой уровень',
    render(container) {
      const grid = el('div', { class:'ob-class-grid' });
      for (let i = 1; i <= 11; i++) {
        const btn = el('button', { class:'ob-class-btn' + (answers.grade===i?' selected':''), 'data-grade':i });
        btn.textContent = i;
        btn.addEventListener('click', () => {
          answers.grade = i;
          grid.querySelectorAll('.ob-class-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updateNext();
        });
        grid.appendChild(btn);
      }
      container.appendChild(grid);
      // Подпись
      const hint = el('div', { style:'text-align:center;font-size:0.75rem;color:var(--text3);font-family:var(--font-mono);' });
      hint.textContent = 'Нажми на свой класс';
      container.appendChild(hint);
    },
    validate() { return answers.grade !== null; },
    collect() {},
  },

  // 2: Цель
  {
    bubble: (a) => `${a.grade} класс! Зачем тебе SubjectHelper?`,
    title: 'Твоя цель',
    sub: 'Настрою программу под тебя',
    render(container) {
      const goals = [
        { val:'grades',    icon:'📈', name:'Подтянуть оценки',      desc:'Разобраться в темах которые не даются' },
        { val:'oge',       icon:'📝', name:'Подготовка к ОГЭ',      desc:'Систематическая подготовка к экзамену' },
        { val:'ege',       icon:'🎯', name:'Подготовка к ЕГЭ',      desc:'Максимальный балл на выпускном' },
        { val:'olympiad',  icon:'🏆', name:'Олимпиады',             desc:'Углублённое изучение предметов' },
        { val:'curious',   icon:'🧠', name:'Просто интересно',      desc:'Узнавать новое в своём темпе' },
        { val:'homework',  icon:'📚', name:'Помощь с домашкой',     desc:'Быстрое решение заданий' },
      ];
      const grid = el('div', { class:'ob-big-grid' });
      goals.forEach(g => {
        const card = el('div', { class:'ob-big-card' + (answers.goal===g.val?' selected':'') });
        card.innerHTML = `<div class="bc-icon">${g.icon}</div><div class="bc-name">${g.name}</div><div class="bc-desc">${g.desc}</div>`;
        card.addEventListener('click', () => {
          answers.goal = g.val;
          grid.querySelectorAll('.ob-big-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          updateNext();
        });
        grid.appendChild(card);
      });
      container.appendChild(grid);
    },
    validate() { return answers.goal !== null; },
    collect() {},
  },

  // 3: Слабые предметы
  {
    bubble: (a) => a.goal === 'curious' ? 'Что хочешь изучать?' : 'Что даётся сложнее всего?',
    title: (a) => a.goal === 'curious' ? 'Интересные предметы' : 'Слабые предметы',
    sub: 'Можно выбрать несколько',
    render(container) {
      const subjects = [
        '📐 Математика','📝 Русский язык','📖 Литература','🔬 Физика',
        '⚗️ Химия','🧬 Биология','📜 История','⚖️ Обществознание',
        '🌍 Английский','💻 Информатика','🌐 География','🎨 Другое',
      ];
      const grid = el('div', { class:'ob-grid' });
      subjects.forEach(s => {
        const name = s.split(' ').slice(1).join(' ');
        const chip = el('button', { class:'ob-chip' + (answers.weakSubjects.includes(name)?' selected':'') });
        chip.textContent = s;
        chip.addEventListener('click', () => {
          if (answers.weakSubjects.includes(name)) {
            answers.weakSubjects = answers.weakSubjects.filter(x=>x!==name);
            chip.classList.remove('selected');
          } else {
            answers.weakSubjects.push(name);
            chip.classList.add('selected');
          }
          updateNext();
        });
        grid.appendChild(chip);
      });
      container.appendChild(grid);

      container.appendChild(hint);
    },
    validate() { return answers.weakSubjects.length > 0; },
    collect() {},
  },

  // 4: Увлечения
  {
    bubble: 'Расскажи о себе! Чем увлекаешься?',
    title: 'Твои увлечения',
    sub: 'Буду объяснять через то, что тебе близко',
    render(container) {
      const interests = [
        '🎮 Игры','⚽ Спорт','🎵 Музыка','💻 Технологии',
        '🎬 Кино','🌿 Природа','🎨 Рисование','📱 Соцсети',
        '🚗 Машины','✈️ Путешествия','🍕 Еда','📚 Книги',
        '🤖 ИИ и роботы','🎭 Театр','🏋️ Фитнес','🎯 Другое',
      ];
      const grid = el('div', { class:'ob-grid' });
      interests.forEach(s => {
        const name = s.split(' ').slice(1).join(' ');
        const chip = el('button', { class:'ob-chip selected-purple' + (answers.interests.includes(name)?' selected':'') });
        chip.textContent = s;
        chip.style.borderColor = answers.interests.includes(name) ? 'var(--purple)' : 'var(--border2)';
        chip.style.background  = answers.interests.includes(name) ? 'rgba(167,139,250,0.1)' : '';
        chip.style.color       = answers.interests.includes(name) ? 'var(--purple)' : '';
        chip.addEventListener('click', () => {
          if (answers.interests.includes(name)) {
            answers.interests = answers.interests.filter(x=>x!==name);
            chip.style.borderColor = 'var(--border2)';
            chip.style.background  = '';
            chip.style.color       = '';
          } else {
            answers.interests.push(name);
            chip.style.borderColor = 'var(--purple)';
            chip.style.background  = 'rgba(167,139,250,0.1)';
            chip.style.color       = 'var(--purple)';
          }
          updateNext();
        });
        grid.appendChild(chip);
      });
      container.appendChild(grid);
    },
    validate() { return answers.interests.length > 0; },
    collect() {},
  },

  // 5: Стиль обучения
  {
    bubble: 'Как тебе лучше объяснять?',
    title: 'Стиль объяснений',
    sub: 'Подстрою под тебя',
    render(container) {
      const styles = [
        { val:'simple',   icon:'🎯', name:'Просто и коротко',    desc:'Самое важное без лишнего' },
        { val:'detailed', icon:'📚', name:'Подробно',            desc:'Со всеми деталями и нюансами' },
        { val:'examples', icon:'💡', name:'Через примеры',       desc:'Каждую тему на реальных примерах' },
        { val:'humor',    icon:'😄', name:'С юмором',            desc:'Весело и неформально' },
        { val:'steps',    icon:'🪜', name:'Шаг за шагом',        desc:'Медленно, не торопясь' },
        { val:'strict',   icon:'📐', name:'По учебнику',         desc:'Строго и по правилам' },
      ];
      const grid = el('div', { class:'ob-big-grid' });
      styles.forEach(s => {
        const card = el('div', { class:'ob-big-card selected-blue' + (answers.style===s.val?' selected-blue':'') });
        if (answers.style === s.val) card.style.borderColor = 'var(--blue)';
        card.innerHTML = `<div class="bc-icon">${s.icon}</div><div class="bc-name">${s.name}</div><div class="bc-desc">${s.desc}</div>`;
        card.addEventListener('click', () => {
          answers.style = s.val;
          grid.querySelectorAll('.ob-big-card').forEach(c => {
            c.style.borderColor = ''; c.style.background = '';
            c.querySelector('.bc-name').style.color = '';
          });
          card.style.borderColor = 'var(--blue)';
          card.style.background = 'rgba(79,195,247,0.07)';
          card.querySelector('.bc-name').style.color = 'var(--blue)';
          updateNext();
        });
        grid.appendChild(card);
      });
      container.appendChild(grid);
    },
    validate() { return answers.style !== null; },
    collect() {},
  },

  // 6: Время в день
  {
    bubble: (a) => `Отлично! Сколько времени в день, ${a.name}?`,
    title: 'Сколько времени учишься?',
    sub: 'Подберу оптимальную нагрузку',
    render(container) {
      const times = [
        { val:15,  label:'15', desc:'Немного в день' },
        { val:30,  label:'30', desc:'Полчаса — самое то' },
        { val:60,  label:'60', desc:'Серьёзный подход' },
        { val:120, label:'2ч', desc:'Интенсивная подготовка' },
      ];
      const row = el('div', { class:'ob-time-row' });
      times.forEach(t => {
        const btn = el('div', { class:'ob-time-btn' + (answers.timePerDay===t.val?' selected':'') });
        btn.innerHTML = `<div class="tb-min">${t.label}</div><div class="tb-lbl">${t.val < 60 ? 'мин' : ''}</div><div class="tb-lbl" style="margin-top:4px">${t.desc}</div>`;
        btn.addEventListener('click', () => {
          answers.timePerDay = t.val;
          row.querySelectorAll('.ob-time-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updateNext();
        });
        row.appendChild(btn);
      });
      container.appendChild(row);
    },
    validate() { return answers.timePerDay !== null; },
    collect() {},
  },

  // 7: Откуда узнал
  {
    bubble: 'Последний вопрос! Как ты нас нашёл?',
    title: 'Откуда узнал о нас?',
    sub: 'Поможет нам стать лучше',
    render(container) {
      const sources = ['👫 От друга','📱 В соцсетях','👨‍🏫 Учитель посоветовал','🔍 Нашёл сам','📺 YouTube','🤖 ИИ посоветовал','Другое'];
      const grid = el('div', { class:'ob-grid' });
      sources.forEach(s => {
        const chip = el('button', { class:'ob-chip' + (answers.source===s?' selected':'') });
        chip.textContent = s;
        chip.addEventListener('click', () => {
          answers.source = s;
          grid.querySelectorAll('.ob-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          updateNext();
        });
        grid.appendChild(chip);
      });
      container.appendChild(grid);
    },
    validate() { return answers.source !== null; },
    collect() {},
  },

  // 8: Финальный экран
  {
    isFinal: true,
    bubble: null,
    render(container) {
      const goalNames = {
        grades:'подтянуть оценки', oge:'подготовка к ОГЭ', ege:'подготовка к ЕГЭ',
        olympiad:'олимпиады', curious:'изучение из интереса', homework:'помощь с домашкой',
      };
      const styleNames = {
        simple:'просто и коротко', detailed:'подробно', examples:'через примеры',
        humor:'с юмором', steps:'шаг за шагом', strict:'по учебнику',
      };
      container.innerHTML = `
        <div class="ob-final">
          <div class="ob-final-fairik">${FAIRIK_SVG}</div>
          <h1>Всё готово, ${answers.name}! 🎉</h1>
          <p class="ob-sub">Файрик уже знает о тебе всё нужное</p>
          <div class="ob-summary">
            <div class="ob-sum-row"><span class="ob-sum-key">Класс</span><span class="ob-sum-accent">${answers.grade} класс</span></div>
            <div class="ob-sum-row"><span class="ob-sum-key">Цель</span><span class="ob-sum-val">${goalNames[answers.goal] || answers.goal}</span></div>
            <div class="ob-sum-row"><span class="ob-sum-key">Предметы</span><span class="ob-sum-val">${answers.weakSubjects.slice(0,3).join(', ')}${answers.weakSubjects.length>3?' и ещё...':''}</span></div>
            <div class="ob-sum-row"><span class="ob-sum-key">Стиль</span><span class="ob-sum-val">${styleNames[answers.style] || answers.style}</span></div>
            <div class="ob-sum-row"><span class="ob-sum-key">Время в день</span><span class="ob-sum-accent">${answers.timePerDay < 60 ? answers.timePerDay + ' мин' : answers.timePerDay/60 + ' ч'}</span></div>
          </div>
        </div>
      `;
      // Конфетти
      spawnConfetti();
    },
    validate() { return true; },
    collect() {},
  },
];

// ══════════════════════════════════════════
//  ДВИЖОК
// ══════════════════════════════════════════
let currentStep = 0;
const TOTAL = STEPS.length;

function el(tag, attrs = {}) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else e.setAttribute(k, v);
  });
  return e;
}

function getBubbleText(step) {
  const b = step.bubble;
  if (!b) return null;
  return typeof b === 'function' ? b(answers) : b;
}

function getTitle(step) {
  const t = step.title;
  if (!t) return '';
  return typeof t === 'function' ? t(answers) : t;
}

function renderStep(stepIdx, direction = 'forward') {
  const step = STEPS[stepIdx];
  const container = document.getElementById('obContainer');

  // Анимация выхода
  container.style.animation = 'obSlideOut 0.2s ease forwards';
  setTimeout(() => {
    container.style.animation = '';
    container.innerHTML = '';

    // Файрик с пузырём
    const bubbleTxt = getBubbleText(step);
    if (bubbleTxt && !step.isFinal) {
      const fairikWrap = el('div', { class:'ob-fairik' });
      const bub = el('div', { class:'ob-bubble', id:'obBubble' });
      bub.textContent = '';
      fairikWrap.innerHTML = FAIRIK_SVG;
      fairikWrap.appendChild(bub);
      container.appendChild(fairikWrap);
      // Печатаем текст пузыря
      let i = 0;
      const iv = setInterval(() => {
        bub.textContent = bubbleTxt.slice(0, ++i);
        if (i >= bubbleTxt.length) clearInterval(iv);
      }, 22);
    }

    if (!step.isFinal) {
      // Заголовок
      const titleEl = el('div', { class:'ob-title' });
      titleEl.textContent = getTitle(step);
      container.appendChild(titleEl);

      if (step.sub) {
        const subEl = el('div', { class:'ob-sub' });
        subEl.textContent = typeof step.sub === 'function' ? step.sub(answers) : step.sub;
        container.appendChild(subEl);
      }
    }

    // Контент шага
    step.render(container);

    if (!step.isFinal) {
      // Навигация
      const nav = el('div', { class:'ob-nav' });
      if (stepIdx > 0) {
        const back = el('button', { class:'ob-btn-back' });
        back.textContent = '←';
        back.title = 'Назад';
        back.addEventListener('click', () => goBack());
        nav.appendChild(back);
      }
      const next = el('button', { class:'ob-btn-next', id:'ob-next' });
      next.textContent = stepIdx === TOTAL - 2 ? 'Завершить! 🐉' : 'Далее →';
      next.disabled = !step.validate();
      next.addEventListener('click', () => goNext());
      nav.appendChild(next);
      container.appendChild(nav);
    } else {
      // Финальная кнопка — сохранить и перейти
      const btn = el('button', { class:'ob-btn-next', style:'width:100%;margin-top:16px;' });
      btn.textContent = 'Начать обучение с Файриком! 🚀';
      btn.addEventListener('click', () => saveAndRedirect());
      container.appendChild(btn);
    }

    container.style.animation = 'obSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    updateProgress();
    updateDots();
  }, 200);
}

function updateNext() {
  const step = STEPS[currentStep];
  step.collect();
  const btn = document.getElementById('ob-next');
  if (btn) btn.disabled = !step.validate();
}

function goNext() {
  const step = STEPS[currentStep];
  step.collect();
  if (!step.validate()) return;
  currentStep++;
  renderStep(currentStep, 'forward');
}

function goBack() {
  if (currentStep <= 0) return;
  currentStep--;
  renderStep(currentStep, 'back');
}

function updateProgress() {
  const pct = Math.round((currentStep / (TOTAL - 1)) * 100);
  document.getElementById('obProgress').style.width = pct + '%';
}

function updateDots() {
  const dotsEl = document.getElementById('obDots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = el('div', { class: 'ob-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '') });
    dotsEl.appendChild(d);
  }
}

// ══════════════════════════════════════════
//  СОХРАНЕНИЕ
// ══════════════════════════════════════════
async function saveAndRedirect() {
  // Сохраняем в localStorage для немедленного использования
  localStorage.setItem('user_class',   answers.grade);
  localStorage.setItem('user_class_num', answers.grade);
  localStorage.setItem('interests',    JSON.stringify(answers.interests));
  localStorage.setItem('sh_learn_style', answers.style || 'examples');
  localStorage.setItem('sh_learn_context', answers.interests[0] || 'games');
  localStorage.setItem('ob_done',      '1');
  localStorage.setItem('ob_name',      answers.name);

  // Отправляем на сервер
  try {
    await fetch('/api/onboarding', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(answers),
    });
  } catch(e) {}

  // Редирект на главную
  window.location.href = '/';
}

// ══════════════════════════════════════════
//  КОНФЕТТИ
// ══════════════════════════════════════════
function spawnConfetti() {
  const colors = ['#00ff88','#a78bfa','#ff6eb0','#ffd700','#60cfff','#ff7c3a'];
  const wrap = document.getElementById('obConfetti');
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const d = el('div', { class:'ob-conf-dot' });
      d.style.left = Math.random() * 100 + 'vw';
      d.style.top  = '-10px';
      d.style.background = colors[Math.floor(Math.random() * colors.length)];
      d.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      d.style.animationDelay   = (Math.random() * 0.8) + 's';
      d.style.width  = (6 + Math.random() * 8) + 'px';
      d.style.height = (6 + Math.random() * 8) + 'px';
      d.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      wrap.appendChild(d);
      setTimeout(() => d.remove(), 4000);
    }, i * 30);
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderStep(0);
</script>
