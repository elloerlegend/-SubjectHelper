<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>SubjectHelper — Викторина</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='back.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='avatar.ico') }}">
  <style>
    .quiz-container { max-width: 800px; margin: 40px auto; padding: 24px; background: rgba(255,255,255,0.04); border-radius: 12px; }
    .question { margin-bottom: 18px; padding: 14px; border-radius: 10px; background: rgba(255,255,255,0.02); }
    .options { margin-top: 8px; display: grid; gap:8px; }
    .option-btn { padding: 10px 12px; border-radius: 10px; border:1px solid rgba(255,255,255,0.06); cursor:pointer; background:transparent; text-align:left; }
    .option-btn.selected { background: rgba(76,175,80,0.12); border-color: rgba(76,175,80,0.25); }
    .controls { display:flex; gap:10px; margin-top: 16px; }
  </style>
</head>
<body>
  <header>
    <a href="/"><img class="logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="Логотип"></a>
    {{ menu | safe }}
  </header>

  <main class="quiz-container">
    <h1>Проверка знаний</h1>

    <div style="display:flex; gap:12px; align-items:center; margin-bottom:16px;">
      <select id="subject" style="padding:8px; border-radius:8px;">
        <option>Математика</option><option>Русский язык</option><option>Физика</option><option>Информатика</option>
      </select>
      <input id="topic" placeholder="Тема (необязательно)" style="flex:1; padding:8px; border-radius:8px;" />
      <button id="startBtn" class="nickname-btn">Сгенерировать тест</button>
    </div>

    <div id="quizArea"></div>

    <div id="resultArea" style="margin-top:18px;"></div>
  </main>

  {{ menu_js | safe }}

<script>
const startBtn = document.getElementById('startBtn');
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
let currentQuestions = [];
let choices = [];

startBtn.onclick = async () => {
  const subject = document.getElementById('subject').value;
  const topic = document.getElementById('topic').value;
  startBtn.disabled = true; startBtn.textContent = 'Генерируется...';
  const res = await fetch('/quiz/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({subject, topic, count:5})
  });
  const data = await res.json();
  startBtn.disabled = false; startBtn.textContent = 'Сгенерировать тест';
  if (!data.ok) { alert('Ошибка генерации'); return; }
  currentQuestions = data.questions;
  choices = new Array(currentQuestions.length).fill(null);
  renderQuiz();
};

function renderQuiz() {
  quizArea.innerHTML = '';
  currentQuestions.forEach((q, i) => {
    const div = document.createElement('div'); div.className = 'question';
    const qh = document.createElement('div'); qh.innerHTML = `<strong>${i+1}. ${q.q}</strong>`;
    div.appendChild(qh);
    const opts = document.createElement('div'); opts.className = 'options';
    (q.options || []).forEach((opt, idx) => {
      const btn = document.createElement('button'); btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        choices[i] = idx;
        // визуально отметить выбор
        opts.querySelectorAll('.option-btn').forEach((b,bi)=>b.classList.toggle('selected', bi===idx));
      };
      opts.appendChild(btn);
    });
    div.appendChild(opts);
    quizArea.appendChild(div);
  });

  const controls = document.createElement('div'); controls.className = 'controls';
  const submitBtn = document.createElement('button'); submitBtn.className = 'nickname-btn'; submitBtn.textContent = 'Отправить ответы';
  submitBtn.onclick = submitAnswers;
  controls.appendChild(submitBtn);
  quizArea.appendChild(controls);
}

async function submitAnswers() {
  // проверим на пустые
  if (choices.some(c => c === null)) {
    if (!confirm('Некоторые вопросы не отвечены. Отправить всё равно?')) return;
  }
  const subject = document.getElementById('subject').value;
  const topic = document.getElementById('topic').value;
  const payload = { subject, topic, questions: currentQuestions, answers: choices };
  const res = await fetch('/quiz/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!data.ok) { alert('Ошибка отправки'); return; }

  // Показываем результат
  resultArea.innerHTML = `<h3>Результат: ${data.correct} / ${data.total}</h3>`;
  // детальный вывод
  data.details.forEach((d, i) => {
    const el = document.createElement('div');
    el.style.marginTop = '10px';
    el.innerHTML = `<strong>${i+1}. ${d.q}</strong><div>Ваш ответ: ${d.chosen===null ? '—' : d.options[d.chosen]}</div>
      <div>Правильно: ${d.options[d.correct]}</div>
      <div>Статус: ${d.ok ? '✅' : '❌'}</div>`;
    resultArea.appendChild(el);
  });

  if (data.explanations) {
    const ex = document.createElement('div'); ex.style.marginTop = '12px';
    ex.innerHTML = `<h4>Объяснения:</h4><pre style="white-space:pre-wrap">${data.explanations}</pre>`;
    resultArea.appendChild(ex);
  }

  // можно очистить quizArea или оставить для просмотра
}
</script>
</body>
</html>
